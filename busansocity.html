<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BUSANSO – Movies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
  color:#fff;
  font-family:'Comic Sans MS', Arial, sans-serif;
}
.logo{
  display:flex;
  justify-content:center;
  padding:16px 10px 6px;
}
.logo img{
  height:50px;
  border-radius:12px;
}
.nav{
  display:flex;
  gap:10px;
  padding:12px;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}
.nav button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:18px;
  background:linear-gradient(45deg, #ff7f50, #ff6347);
  color:#fff;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
  box-shadow: 0 4px 12px rgba(0,0,0,.5);
}
.nav button:nth-child(2){background:linear-gradient(45deg, #6a5acd, #836fff);}
.nav button:nth-child(3){background:linear-gradient(45deg, #20b2aa, #3cb371);}
.nav button:nth-child(4){background:linear-gradient(45deg, #ff69b4, #ff1493);}
.nav button:hover{
  filter: brightness(1.2) saturate(1.3);
  transform:translateY(-2px) scale(1.05);
}
.search{
  padding:16px;
}
.search input, .search select{
  width:100%;
  padding:14px;
  border-radius:18px;
  border:none;
  background:#222;
  color:#fff;
  font-size:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.5);
  margin-bottom:10px;
}
.movies{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  padding:16px;
  margin-bottom:80px;
}
@media(min-width:600px){.movies{grid-template-columns:repeat(4,1fr);}}
@media(min-width:900px){.movies{grid-template-columns:repeat(5,1fr);}}
.card{
  background:linear-gradient(145deg,#181818,#282828);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.45);
  opacity:0;
  transform:translateY(20px);
  animation:fade .4s forwards;
  position:relative;
  transition:.25s;
}
.card:hover{transform:translateY(-5px) scale(1.02);}
@keyframes fade{to{opacity:1;transform:none}}
.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  border-bottom:2px solid #444;
}
.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:6px 12px;
  font-size:12px;
  font-weight:bold;
  border-radius:12px;
  text-transform:uppercase;
  box-shadow:0 2px 8px rgba(0,0,0,.6);
}
.badge.free{background:#28a745}
.badge.premium{background:#e50914}
.info{padding:14px}
.title{
  font-weight:bold;
  font-size:16px;
  text-shadow:0 1px 4px rgba(0,0,0,.7);
}
.meta{
  font-size:13px;
  color:#ccc;
  margin:6px 0 6px;
}
.created{
  font-size:12px;
  color:#aaa;
  margin-bottom:6px;
}
.watch{
  width:100%;
  padding:16px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#e50914,#ff416c);
  color:#fff;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 4px 12px rgba(0,0,0,.6);
}
.watch:hover{
  background:linear-gradient(45deg,#ff416c,#e50914);
  transform:scale(1.03);
}
.footer-categories{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  gap:10px;
  padding:10px 12px;
  background:#111;
  z-index:20;
  box-shadow:0 -4px 12px rgba(0,0,0,.6);
}
.footer-categories button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:18px;
  background:linear-gradient(45deg,#282828,#383838);
  color:#fff;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  transition:.25s;
}
.footer-categories button:hover{
  background:linear-gradient(45deg,#e50914,#ff416c);
  transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="logo">
  <img src="https://i.ibb.co/1GMMrMmS/logo.png" alt="BUSANSO">
</div>

<div class="nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='series.html'">📺 Series</button>
  <button onclick="location.href='donate.html'">❤️ Donate</button>
  <button onclick="location.href='https://www.youtube.com/channel/UC9tPdYzPSM6LOXSGUbea7nw'">😂 Funny Videos</button>
</div>

<div class="search">
  <input id="search" placeholder="Search movies...">
  <select id="genreFilter">
    <option value="ALL">All Genres</option>
    <option value="ACTION">Action</option>
    <option value="COMEDY">Comedy</option>
    <option value="DRAMA">Drama</option>
    <option value="HORROR">Horror</option>
    <option value="ROMANCE">Romance</option>
  </select>
</div>

<div class="movies" id="list"></div>

<div class="footer-categories">
  <button onclick="filterCountry('ALL', this)">ALL</button>
  <button onclick="filterCountry('INDIA', this)">INDIA</button>
  <button onclick="filterCountry('USA', this)">USA</button>
  <button onclick="filterCountry('CHINA', this)">CHINA</button>
  <button onclick="filterCountry('KOREA', this)">KOREA</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// Supabase client
const supabaseUrl = 'https://dhkfhhybzcxdeoalcfqx.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY';
const supabase = createClient(supabaseUrl, supabaseKey);

// DOM elements
const box = document.getElementById("list");
const search = document.getElementById("search");
const genreSelect = document.getElementById("genreFilter");

// Filters
let MOVIES = [];
let activeCountry = null;
let activeGenre = null;

/* RENDER MOVIES */
function render(data){
  box.innerHTML = ""; // clear cards

  if(!data || data.length === 0){
    box.innerHTML = "<p style='color:#fff; text-align:center; grid-column:1/-1;'>No movies found.</p>";
    return;
  }

  data.forEach((m, i) => {
    const c = document.createElement("div");
    c.className = "card";
    c.style.animationDelay = i * 0.05 + "s";

    // badge from type (free/premium)
    const badge = m.type ? `<div class="badge ${m.type.toLowerCase()}">${m.type}</div>` : "";

    // created_at formatting
    const created = m.created_at ? `<div class="created" style="font-size:12px; color:#aaa; margin-top:4px;">Added: ${new Date(m.created_at).toLocaleDateString()}</div>` : "";

    c.innerHTML = `
      ${badge}
      <img src="${m.poster}" alt="${m.title}">
      <div class="info">
        <div class="title">${m.title}</div>
        <div class="meta">${m.country || ''} • ${m.year || ''} • ${m.genre || ''}</div>
        ${created}
        <button class="watch">▶ Watch</button>
      </div>
    `;

    // watch button click
    const btn = c.querySelector("button.watch");
    if(btn){
      btn.onclick = () => location.href = `movie.html?id=${m.id}`;
    }

    box.appendChild(c);
  });
}

/* FETCH MOVIES FROM SUPABASE */
async function loadMovies(){
  const { data, error } = await supabase
    .from('movies')
    .select('*')
    .order('created_at', { ascending: false }); // newest first

  if(error){
    console.error("Supabase fetch error:", error);
    box.innerHTML = "<p>Failed to load movies.</p>";
    return;
  }

  MOVIES = data;
  render(MOVIES);

  } catch(err){
    console.error("Unexpected error:", err);
    box.innerHTML = "<p style='color:#fff; text-align:center;'>Failed to load movies.</p>";
  }
}

// Call fetch on page load
loadMovies();

/* SEARCH FILTER */
search.oninput = () => applyFilters();

/* GENRE FILTER */
genreSelect.onchange = () => {
  const val = genreSelect.value.toUpperCase();
  activeGenre = val === "ALL" ? null : val;
  applyFilters();
};

/* COUNTRY FILTER */
function filterCountry(country, btn){
  activeCountry = (country === 'ALL') ? null : country.toUpperCase();
  highlightActive(btn);
  applyFilters();
}

/* APPLY FILTERS */
function applyFilters(){
  let filtered = MOVIES;

  if(activeCountry){
    filtered = filtered.filter(m => m.country && m.country.toUpperCase() === activeCountry);
  }
  if(activeGenre){
    filtered = filtered.filter(m => m.genre && m.genre.toUpperCase() === activeGenre);
  }

  const query = search.value.toLowerCase();
  if(query){
    filtered = filtered.filter(m => m.title.toLowerCase().includes(query));
  }

  render(filtered);
}

/* HIGHLIGHT ACTIVE COUNTRY BUTTON */
function highlightActive(btn){
  document.querySelectorAll(".footer-categories button").forEach(b => {
    b.style.background = "linear-gradient(45deg,#282828,#383838)";
  });
  btn.style.background = "linear-gradient(45deg,#e50914,#ff416c)";
}
</script>

// INITIAL LOAD
loadMovies();
</script>

</body>
</html>
