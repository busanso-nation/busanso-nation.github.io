<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BUSANSO – Series</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
const activePIN = localStorage.getItem("activePIN");
if(!activePIN || activePIN === "undefined" || activePIN === ""){
  window.location.href = "expired.html";
}
</script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#0b1c24,#0a0f1a);
  color:#eaf6ff;
  font-family:Arial, sans-serif;
}
.logo{display:flex;justify-content:center;padding:18px 10px 10px;background:#07141c;}
.logo img{height:46px;}
.nav{display:flex;gap:12px;padding:14px;background:#07141c;position:sticky;top:0;z-index:10;}
.nav button{flex:1;padding:14px;border:none;border-radius:18px;background:linear-gradient(135deg,#1f6cff,#29ffd8);color:#001018;font-weight:bold;font-size:14px;cursor:pointer;transition:.25s;}
.nav button:hover{transform:translateY(-2px) scale(1.02);filter:brightness(1.1);}
.filters{display:flex;gap:12px;padding:16px;background:#07141c;justify-content:flex-start;align-items:center;}
.filters select{padding:8px 10px;border-radius:12px;border:none;background:#102a38;color:#eaf6ff;font-size:14px;cursor:pointer;}
.search{padding:16px;background:#07141c;}
.search input{width:100%;padding:12px;border-radius:20px;border:none;background:#102a38;color:#eaf6ff;font-size:15px;}
.search input::placeholder{color:#9fc6d9;}
.series{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;margin-bottom:80px;}
@media(min-width:768px){.series{grid-template-columns:repeat(4,1fr);gap:16px;}}
@media(min-width:1200px){.series{grid-template-columns:repeat(5,1fr);gap:18px;}}
.card{background:linear-gradient(180deg,#102a38,#0b1c24);border-radius:22px;overflow:hidden;box-shadow:0 14px 35px rgba(0,0,0,.5);opacity:0;transform:translateY(20px);animation:fade .4s forwards;transition:.25s;}
.card:hover{transform:translateY(-6px);}
@keyframes fade{to{opacity:1;transform:none}}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;}
.info{padding:12px}
.title{font-weight:bold;font-size:14px;}
.meta{font-size:11px;color:#9fc6d9;margin:6px 0 12px;}
.watch{width:100%;padding:8px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff7a18,#ffb347);color:#2a0d00;font-weight:bold;font-size:12px;cursor:pointer;}
.watch:hover{transform:scale(1.03);filter:brightness(1.1);}
</style>
</head>
<body>

<div class="logo">
  <img src="https://i.ibb.co/1GMMrMmS/logo.png">
</div>

<div class="nav">
  <button onclick="location.href='watch.html'">🏠 Home</button>
  <button onclick="location.href='movies.html'">🎬 Movies</button>
  <button onclick="location.href='donate.html'">❤️ Donate</button>
  <button onclick="location.href='marriage.html'">💍 Marriage Tips</button>
</div>

<div class="filters">
  <select id="genreFilter">
    <option value="ALL">All Genres</option>
    <option value="ACTION">Action</option>
    <option value="DRAMA">Drama</option>
    <option value="COMEDY">Comedy</option>
  </select>
  <select id="countryFilter">
    <option value="ALL">All Countries</option>
    <option value="INDIA">India</option>
    <option value="USA">USA</option>
    <option value="KOREA">Korea</option>
  </select>
</div>

<div class="search">
  <input id="search" placeholder="Search series...">
</div>

<div class="series" id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const box=document.getElementById("list");
const search=document.getElementById("search");
const genreSelect=document.getElementById("genreFilter");
const countrySelect=document.getElementById("countryFilter");

let activeGenre=null;
let activeCountry=null;
let SERIES=[];

const SUPABASE_URL="https://dhkfhhybzcxdeoalcfqx.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function loadSeries(){
  const {data,error}=await supabaseClient
    .from("series")
    .select("*")
    .order("created_at",{ascending:false});
  if(error){console.error(error);return;}
  SERIES=data;
  applyFilters();
}

function applyFilters(){
  let filtered=SERIES;
  if(activeGenre && activeGenre!=="ALL") filtered=filtered.filter(s=>s.genre?.toUpperCase()===activeGenre);
  if(activeCountry && activeCountry!=="ALL") filtered=filtered.filter(s=>s.country?.toUpperCase()===activeCountry);
  const q=search.value.toLowerCase();
  if(q) filtered=filtered.filter(s=>s.title.toLowerCase().includes(q));
  render(filtered);
}

function render(data){
  box.innerHTML="";
  data.forEach((s,i)=>{
    const c=document.createElement("div");
    c.className="card";
    c.style.animationDelay=i*.05+"s";
    c.innerHTML=`
      <img src="${s.poster}">
      <div class="info">
        <div class="title">${s.title}</div>
        <div class="meta">${s.country||''} • ${s.genre||''} • ${s.year||''}</div>
        <button class="watch">▶ WATCH</button>
      </div>`;
    c.querySelector("button").onclick=()=>location.href=`serie.html?id=${s.id}`;
    box.appendChild(c);
  });
}

/* Event listeners */
search.oninput=applyFilters;
genreSelect.onchange=()=>{activeGenre=genreSelect.value;applyFilters();}
countrySelect.onchange=()=>{activeCountry=countrySelect.value;applyFilters();}

loadSeries();
</script>

</body>
</html>
