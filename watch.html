<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Busanso Nation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
padding:15px;
}

/* MAIN CARD */

.dashboard{
width:100%;
max-width:520px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
font-size:2.5rem;
font-weight:900;
background:linear-gradient(90deg,#ff2e63,#ffa62b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header small{
color:#aaa;
}

/* USER BOX */

.user-box{
background:#1b1b1b;
border-radius:18px;
padding:18px;
margin-bottom:18px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.countdown{
font-weight:700;
color:#ffa62b;
}

/* MAIN BUTTONS */

.main-buttons{
display:grid;
grid-template-columns:1fr;
gap:14px;
margin-bottom:20px;
}

.big-btn{
padding:22px;
border-radius:16px;
font-size:1.3rem;
font-weight:700;
text-align:center;
text-decoration:none;
color:white;
}

.movies{
background:linear-gradient(135deg,#ff2e63,#ff6b6b);
}

.series{
background:linear-gradient(135deg,#4361ee,#4cc9f0);
}

/* CONTINUE WATCHING */

.continue{
margin-top:15px;
}

.continue h3{
margin-bottom:10px;
}

.continue-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.poster-card{
background:#1b1b1b;
border-radius:14px;
padding:12px;
text-align:center;
}

.poster-card img{
width:100%;
border-radius:10px;
}

.poster-card button{
margin-top:6px;
border:none;
background:#ff2e63;
color:white;
padding:7px 10px;
border-radius:8px;
cursor:pointer;
}

/* FOOTER MENU */

.footer-menu{
display:flex;
justify-content:space-between;
margin-top:20px;
gap:8px;
}

.footer-btn{
flex:1;
padding:10px;
text-align:center;
border-radius:10px;
text-decoration:none;
font-size:.8rem;
font-weight:600;
color:white;
}

.extend{background:#ffa62b;}
.city{background:#7209b7;}
.donate{background:#ff006e;}
.live{background:#06d6a0;}

footer{
text-align:center;
margin-top:15px;
font-size:.8rem;
opacity:.7;
}

</style>
</head>

<body>

<div class="dashboard">

<div class="header">
<h1 id="planNickname">Loading...</h1>
<small id="planLabel">Loading...</small>
</div>

<div class="user-box">

<div class="row">
<span>Your Password</span>
<span>••••••••</span>
</div>

<div class="row">
<span>Expires In</span>
<span class="countdown" id="timeLeft">Loading...</span>
</div>

</div>

<div class="main-buttons">

<a href="movies.html" class="big-btn movies">
🎬 Watch Movies
</a>

<a href="series.html" class="big-btn series">
📺 Watch Series
</a>

</div>

<div class="continue">

<h3>Continue Watching</h3>

<div class="continue-grid">

<div class="poster-card" id="lastMovieCard"></div>

<div class="poster-card" id="lastSeriesCard"></div>

</div>

</div>

<div class="footer-menu">

<a href="packages.html" class="footer-btn extend">Extend</a>

<a href="busansocity.html" class="footer-btn city">City</a>

<a href="donate.html" class="footer-btn donate">Donate</a>

<a href="live.html" class="footer-btn live">Live</a>

</div>

<footer>
💫 Thank you for being part of Busanso Nation
</footer>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

/* YOUR ORIGINAL FIREBASE CODE */

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "busanso-pins.firebaseapp.com",
databaseURL: "https://busanso-pins-default-rtdb.firebaseio.com/",
projectId: "busanso-pins",
storageBucket: "busanso-pins.firebasestorage.app",
messagingSenderId: "137040014808",
appId: "1:137040014808:web:b0684e17b6b0328da596ad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const pin = localStorage.getItem("activePIN");

if(!pin){
location.href="expired.html";
}

db.ref("pins/"+pin).get().then(snapshot=>{

const data=snapshot.val();

const planNicknames={
Weekly:"Beginner",
Monthly:"Kabeja",
"Half-Year":"Kabeje",
Annual:"Kabejest"
};

document.getElementById("planNickname").textContent=
planNicknames[data.type]||data.type;

document.getElementById("planLabel").textContent=
`Package: ${data.type}`;

function updateCountdown(){

const diff=data.expiry-Date.now();

if(diff<=0){
location.href="expired.html";
return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor(diff%86400000/3600000);
const m=Math.floor(diff%3600000/60000);
const s=Math.floor(diff%60000/1000);

timeLeft.textContent=`${d}d ${h}h ${m}m ${s}s`;

}

updateCountdown();
setInterval(updateCountdown,1000);

});

/* CONTINUE WATCHING */

const lastMovieId=localStorage.getItem("lastMovieId");
const lastSeriesData=JSON.parse(localStorage.getItem("lastSeriesId"));

if(lastMovieId){

document.getElementById("lastMovieCard").innerHTML=`

<strong>Last Movie</strong><br>

<button onclick="location.href='movie.html?id=${lastMovieId}'">

Resume ▶

</button>

`;

}

if(lastSeriesData){

document.getElementById("lastSeriesCard").innerHTML=`

<strong>${lastSeriesData.title}</strong><br>

<button onclick="location.href='serie.html?id=${lastSeriesData.id}'">

Resume ▶

</button>

`;

}

</script>

</body>
</html>
