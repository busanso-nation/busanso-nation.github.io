<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Movie | Busanso Nation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
}

/* HERO */
.banner{
  position:relative;
  height:55vh;
  overflow:hidden;
}
.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0b0f1a 20%,transparent);
}

/* BUTTONS */
.controls{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.watch{background:#22c55e;color:#fff;}
.share{background:#3b82f6;color:#fff;}
.option{background:#1e293b;color:#fff;}

/* DETAILS */
.container{padding:16px;max-width:1000px;margin:auto;}
.title{font-size:22px;font-weight:bold;}
.meta{color:#aaa;font-size:13px;margin:5px 0;}
.desc{color:#ddd;margin-top:10px;}

/* PLAYER */
iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:10px;
}
.player{margin-top:20px;display:none;}

/* OPTIONS */
.options{
  display:flex;
  gap:10px;
  margin-top:10px;
}

/* RELATED */
.related{
  margin-top:30px;
}
.grid{
  display:flex;
  gap:10px;
  overflow-x:auto;
}
.card{
  width:120px;
  flex-shrink:0;
}
.card img{
  width:100%;
  border-radius:8px;
}
.card p{
  font-size:12px;
  text-align:center;
}

/* COMMENTS */
#commentsContainer{
  margin-top:30px;
}
.comment{
  padding:8px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div class="banner">
  <img id="poster">
  <div class="controls">
    <button class="watch" id="watchBtn">▶ Watch</button>
    <button class="share" id="shareBtn">Share</button>
  </div>
</div>

<div class="container">
  <div class="title" id="title"></div>
  <div class="meta" id="meta"></div>
  <div class="desc" id="desc"></div>

  <!-- PLAYER -->
  <div class="player" id="playerBox">
    <iframe id="player"></iframe>

    <!-- MULTI OPTIONS -->
    <div class="options">
      <button class="option" onclick="setSource(0)">Server 1</button>
      <button class="option" onclick="setSource(1)">Server 2</button>
      <button class="option" onclick="setSource(2)">Server 3</button>
    </div>
  </div>

  <!-- RELATED -->
  <div class="related">
    <h3>Similar Movies</h3>
    <div class="grid" id="relatedBox"></div>
  </div>

  <!-- COMMENTS -->
  <div id="commentsContainer">
    <h3>Comments</h3>
    <div id="commentsList"></div>

    <input id="usernameInput" placeholder="Name">
    <input id="commentInput" placeholder="Comment">
    <button id="commentBtn">Post</button>
    <div id="commentMsg"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
import { getDatabase, ref, push, onValue } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';

/* ================== CONFIG ================== */
const supabase = createClient(
'https://dhkfhhybzcxdeoalcfqx.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY'
);

const firebaseConfig = {
  apiKey:"AIzaSyBGGV9F3Nv13nRJ8t4QCP5Y0IosmKfYz1s",
  databaseURL:"https://busanso-pins-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================== GET MOVIE ================== */
const id = new URLSearchParams(location.search).get("id");

const { data: movie } = await supabase
.from('movies')
.select('*')
.eq('id', id)
.single();

/* ================== UI ================== */
title.textContent = movie.title;
poster.src = movie.poster;
meta.textContent = `${movie.year} • ${movie.genre}`;
desc.textContent = movie.synopsis || "";

/* ================== VIDEO HANDLER ================== */
function normalize(url){
  if(!url) return "";

  if(url.includes("youtube"))
    return `https://www.youtube.com/embed/${new URL(url).searchParams.get("v")}`;

  if(url.includes("youtu.be"))
    return `https://www.youtube.com/embed/${url.split("/").pop()}`;

  if(url.includes("vimeo"))
    return `https://player.vimeo.com/video/${url.split("/").pop()}`;

  if(url.includes("/d/"))
    return `https://drive.google.com/file/d/${url.split("/d/")[1].split("/")[0]}/preview`;

  return url;
}

/* SUPPORT MULTIPLE LINKS */
const sources = [
  normalize(movie.video),
  normalize(movie.video2),
  normalize(movie.video3)
];

let counted = false;

/* PLAY */
watchBtn.onclick = () => {
  playerBox.style.display = "block";
  setSource(0);

  /* ✅ FIXED VIEW COUNT FOR STRING ID */
  if(!counted){
    counted = true;

    supabase
      .from('movies')
      .update({ views: (movie.views || 0) + 1 })
      .eq('id', movie.id)
      .then(()=>console.log("views updated"))
      .catch(err=>console.log(err));
  }
};

window.setSource = (i) => {
  if(sources[i]) player.src = sources[i];
};

/* ================== RELATED MOVIES ================== */
const { data: related } = await supabase
.from('movies')
.select('*')
.eq('genre', movie.genre)
.neq('id', movie.id)
.limit(10);

related.forEach(r=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML=`
    <img src="${r.poster}">
    <p>${r.title}</p>
  `;
  c.onclick=()=>location.href=`movie.html?id=${r.id}`;
  relatedBox.appendChild(c);
});

/* ================== COMMENTS ================== */
const commentsRef = ref(db, "comments/movies/" + movie.id);

commentBtn.onclick = () => {
  const name = usernameInput.value.trim();
  const text = commentInput.value.trim();

  if(name && text){
    push(commentsRef, { user:name, text, timestamp:Date.now() });
    commentInput.value="";
  }
};

onValue(commentsRef, snap=>{
  commentsList.innerHTML="";
  snap.forEach(c=>{
    const d=document.createElement("div");
    d.className="comment";
    d.innerHTML=`<b>${c.val().user}</b>: ${c.val().text}`;
    commentsList.appendChild(d);
  });
});

/* ================== SHARE ================== */
shareBtn.onclick = ()=>{
  const url = location.href;
  window.open(`https://wa.me/?text=${encodeURIComponent(movie.title + " " + url)}`);
};
</script>

</body>
</html>
