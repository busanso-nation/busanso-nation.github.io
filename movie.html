<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Movie | Busanso Nation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:Arial;
}

/* HERO */
.banner{
  position:relative;
  height:50vh;
}
.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#0f172a 20%,transparent);
}

.buttons{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.watch{background:#22c55e;color:#fff;}
.share{background:#3b82f6;color:#fff;}
.server{background:#1e293b;color:#fff;}

/* DETAILS */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}
.title{font-size:22px;font-weight:bold;}
.meta{color:#aaa;font-size:13px;margin:5px 0;}
.desc{margin-top:10px;color:#ddd}

/* PLAYER */
.player{margin-top:20px;display:none;}
iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:10px;
}

/* SERVERS */
.servers{
  display:flex;
  gap:10px;
  margin-top:10px;
}

/* RELATED */
.related{margin-top:30px;}
.grid{
  display:flex;
  gap:10px;
  overflow-x:auto;
}
.card{
  width:120px;
  flex-shrink:0;
  cursor:pointer;
}
.card img{
  width:100%;
  border-radius:8px;
}
.card p{
  font-size:12px;
  text-align:center;
}

/* COMMENTS */
#commentsContainer{margin-top:30px;}
.comment{padding:8px;border-bottom:1px solid #333;}
input{
  padding:8px;
  border-radius:6px;
  border:none;
  margin-right:6px;
}
</style>
</head>

<body>

<div class="banner">
  <img id="posterImg">
  <div class="buttons">
    <button class="watch" id="watchBtn">▶ Watch Now</button>
    <button class="share" id="shareBtn">Share</button>
  </div>
</div>

<div class="container">
  <div class="title" id="title"></div>
  <div class="meta" id="meta"></div>
  <div class="desc" id="synopsis"></div>

  <!-- PLAYER -->
  <div class="player" id="playerBox">
    <iframe id="player"></iframe>

    <div class="servers">
      <button class="server" onclick="setSource(0)">Server 1</button>
      <button class="server" onclick="setSource(1)">Server 2</button>
      <button class="server" onclick="setSource(2)">Server 3</button>
    </div>
  </div>

  <!-- RELATED -->
  <div class="related">
    <h3>Similar Movies</h3>
    <div class="grid" id="relatedBox"></div>
  </div>

  <!-- COMMENTS -->
  <div id="commentsContainer">
    <h3>Comments</h3>
    <div id="commentsList"></div>

    <input id="usernameInput" placeholder="Name">
    <input id="commentInput" placeholder="Comment">
    <button id="commentBtn">Post</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
import { getDatabase, ref, push, onValue } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';

const supabase = createClient(
'https://dhkfhhybzcxdeoalcfqx.supabase.co',
'YOUR_KEY'
);

const app = initializeApp({
  apiKey:"xxx",
  databaseURL:"xxx"
});
const db = getDatabase(app);

/* GET ID */
const id = new URLSearchParams(location.search).get("id");

/* FETCH MOVIE */
const { data: movie } = await supabase
.from('movies')
.select('*')
.eq('id', id)
.single();

/* 🔒 PREMIUM BLOCK */
if(movie.type === "premium" && !localStorage.getItem("activePIN")){
  document.body.innerHTML = `
    <div style="text-align:center;padding:60px">
      <h2>Premium Movie</h2>
      <button onclick="location.href='packages.html'">Unlock Now</button>
    </div>`;
  throw new Error("blocked");
}

/* UI */
title.textContent = movie.title;
posterImg.src = movie.poster;
synopsis.textContent = movie.synopsis || "";
meta.textContent = `${movie.year || ""} • ${movie.genre || ""}`;

/* VIDEO NORMALIZER */
function normalize(url){
  if(!url) return "";
  if(url.includes("youtube"))
    return `https://www.youtube.com/embed/${new URL(url).searchParams.get("v")}`;
  if(url.includes("youtu.be"))
    return `https://www.youtube.com/embed/${url.split("/").pop()}`;
  if(url.includes("vimeo"))
    return `https://player.vimeo.com/video/${url.split("/").pop()}`;
  if(url.includes("/d/"))
    return `https://drive.google.com/file/d/${url.split("/d/")[1].split("/")[0]}/preview`;
  return url;
}

/* MULTI SOURCES */
const sources = [
  normalize(movie.video),
  normalize(movie.video2),
  normalize(movie.video3)
];

let counted = false;

/* PLAY */
watchBtn.onclick = () => {
  playerBox.style.display = "block";
  setSource(0);

  if(!counted){
    counted = true;

    supabase
      .from('movies')
      .update({ views: (movie.views || 0) + 1 })
      .eq('id', movie.id);
  }
};

window.setSource = (i) => {
  if(sources[i]) player.src = sources[i];
};

/* SHARE */
shareBtn.onclick = ()=>{
  const txt = `${movie.title} ${location.href}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
};

/* RELATED */
const { data: related } = await supabase
.from('movies')
.select('*')
.eq('genre', movie.genre)
.neq('id', movie.id)
.limit(10);

related.forEach(r=>{
  const c=document.createElement("div");
  c.className="card";
  c.innerHTML=`<img src="${r.poster}"><p>${r.title}</p>`;
  
  c.onclick = () => {
    if(r.type === "premium" && !localStorage.getItem("activePIN")){
      location.href = "packages.html";
    } else {
      location.href = `movie.html?id=${r.id}`;
    }
  };

  relatedBox.appendChild(c);
});

/* COMMENTS */
const commentsRef = ref(db, "comments/movies/" + movie.id);

const savedName = localStorage.getItem("username");
if(savedName) usernameInput.value = savedName;

commentBtn.onclick = () => {
  const name = usernameInput.value.trim();
  const text = commentInput.value.trim();

  if(!name || !text) return;

  localStorage.setItem("username", name);

  const newComment = { user:name, text, timestamp:Date.now() };

  // instant UI update
  const div=document.createElement("div");
  div.className="comment";
  div.innerHTML=`<b>${name}</b>: ${text}`;
  commentsList.prepend(div);

  push(commentsRef, newComment);
  commentInput.value="";
};

/* LOAD COMMENTS */
onValue(commentsRef, snap=>{
  commentsList.innerHTML="";
  const arr=[];
  snap.forEach(c=>arr.push(c.val()));
  arr.sort((a,b)=>b.timestamp-a.timestamp);

  arr.forEach(c=>{
    const d=document.createElement("div");
    d.className="comment";
    d.innerHTML=`<b>${c.user}</b>: ${c.text}`;
    commentsList.appendChild(d);
  });
});
</script>

</body>
</html>
