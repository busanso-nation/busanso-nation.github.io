<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="movies-data.js"></script>

<style>
body {
  margin:0;
  background:#111;
  color:#fff;
  font-family: Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

/* ===== BANNER ===== */
.banner {
  position:relative;
  width:100%;
  height:55vh;
  max-height:450px;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

.banner img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  transform:scale(1.1);
  transition:transform 0.6s ease;

  /* ✅ FIX: prevent image blocking button clicks */
  pointer-events:none;
}

.banner:hover img {
  transform:scale(1.15);
}

.banner::after {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.85) 30%, rgba(0,0,0,0.3) 60%, transparent 100%);
  pointer-events:none;
}

.banner .buttons {
  position:absolute;
  bottom:30px;
  left:0;
  right:0;
  display:flex;
  gap:12px;
  justify-content:center;
  z-index:10; /* ✅ FIX: ensure always above ads */
}

button {
  padding:14px 28px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 2px 6px rgba(0,0,0,0.5);
  transition:transform 0.2s;
}

button:hover { transform:scale(1.05); }

button#watchBtn { background:#e50914; color:#fff; }
button#shareBtn { background:#25D366; color:#fff; }

/* ===== DETAILS ===== */
.details {
  max-width:900px;
  margin:20px auto;
  text-align:left;
  padding:0 16px;
}
.details h1 { margin-bottom:10px; font-size:2.2em; }
.details p { line-height:1.5; }

/* ===== PLAYER ===== */
.player {
  margin:20px auto;
  width:90%;
  max-width:1200px;
  aspect-ratio:16/9;
  display:none;
  border:none;
  border-radius:12px;
  position:relative;
  z-index:5;
}

/* ===== ADS ===== */

/* Make ads NEVER block top section */
.ad-horizontal,
.ad-vertical-left,
.ad-vertical-right {
  pointer-events:auto;
}

/* Vertical ads */
.ad-vertical-left,
.ad-vertical-right {
  position:fixed;
  top:120px;
  width:140px;
  display:flex;
  flex-direction:column;
  gap:25px;
  padding:10px;
  z-index:1; /* ✅ LOWER THAN BUTTONS */
  background:rgba(0,0,0,0.3);
  border-radius:8px;
}

.ad-vertical-left { left:10px; }
.ad-vertical-right { right:10px; }

/* Horizontal ads */
.ad-horizontal {
  width:100%;
  max-width:1200px;
  margin:10px auto;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:1; /* ✅ below buttons */
}

/* ===== UPGRADE POPUP ===== */
#upgradePopup {
  position:fixed;
  bottom:30px;
  right:30px;
  background:#e50914;
  color:#fff;
  padding:16px 24px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px #e50914, 0 0 20px #ff0000;
  z-index:2000;
  display:none;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  .banner { height:40vh; }
  button { font-size:14px; padding:12px 20px; }
  .ad-vertical-left, .ad-vertical-right { display:none; }
}
</style>
</head>
<body>

<div class="banner">
  <img id="posterImg" src="" alt="Movie Banner">
  <div class="buttons">
    <button id="watchBtn">▶ Watch Now</button>
    <button id="shareBtn">Share</button>
  </div>
</div>

<div class="ad-horizontal" id="topAds"></div>

<div class="details">
  <h1 id="title">Loading...</h1>
  <p id="synopsis"></p>
  <p id="meta"></p>
</div>

<div class="ad-vertical-left" id="leftAds"></div>
<div class="ad-vertical-right" id="rightAds"></div>

<iframe id="player" class="player" allowfullscreen></iframe>

<div class="ad-horizontal" id="bottomAds"></div>

<div id="upgradePopup">UPGRADE TO SKIP ADS</div>
