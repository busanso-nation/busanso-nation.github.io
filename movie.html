<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Busanso Nation - Watch</title>

<!-- Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
}

/* Header */
.header {
  padding: 15px;
  font-size: 20px;
  color: #22c55e;
  font-weight: bold;
}

/* Layout */
.container {
  max-width: 900px;
  margin: auto;
}

/* Player */
.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

/* Poster */
.poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Overlay */
.playOverlay {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 50px;
  cursor: pointer;
  background: rgba(0,0,0,0.5);
}

/* Meta */
.meta {
  padding: 15px;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

.desc {
  margin-top: 10px;
  color: #ccc;
}

.views {
  margin-top: 10px;
  color: #aaa;
}

/* Buttons */
.actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

button {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s;
}

/* Watch */
#watchBtn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
}

/* Trailer */
#trailerBtn {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: black;
}

/* Share */
#shareBtn {
  background: #1f2937;
  color: white;
}

/* Hover */
button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* Similar */
.similar {
  margin-top: 30px;
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
  gap: 10px;
}

.card img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.card img:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="header">🎬 Busanso Nation</div>

<div class="container">

  <div class="player" id="player"></div>

  <div class="meta">
    <div class="title" id="title">Loading...</div>
    <div class="desc" id="desc"></div>
    <div class="views" id="views"></div>

    <div class="actions">
      <button id="watchBtn"><i data-lucide="play"></i>Watch</button>
      <button id="trailerBtn"><i data-lucide="film"></i>Trailer</button>
      <button id="shareBtn"><i data-lucide="share-2"></i>Share</button>
    </div>

    <div class="similar">
      <h3>Similar Movies</h3>
      <div class="grid" id="similar"></div>
    </div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// 🔐 Supabase
const supabase = createClient(
  "https://dhkfhhybzcxdeoalcfqx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY"
);

// URL param
const movieId = new URLSearchParams(window.location.search).get("id");

// Elements
const player = document.getElementById("player");
const titleEl = document.getElementById("title");
const descEl = document.getElementById("desc");
const viewsEl = document.getElementById("views");
const similarEl = document.getElementById("similar");

let movie = null;

// 🎬 Load movie
async function loadMovie() {

  const { data, error } = await supabase
    .from("movies")
    .select("*")
    .eq("id", movieId)
    .single();

  if (error || !data) {
    titleEl.textContent = "Movie not found";
    return;
  }

  movie = data;

  titleEl.textContent = data.title;
  descEl.textContent = data.synopsis || "";
  viewsEl.textContent = (data.views || 0) + " views";

  showPoster(data.poster, data.video);

  // update views
  await supabase
    .from("movies")
    .update({ views: (data.views || 0) + 1 })
    .eq("id", data.id);

  loadSimilar(data.id);
}

// Poster first
function showPoster(poster, videoUrl) {
  player.innerHTML = `
    <img src="${poster}" class="poster">
    <div class="playOverlay">▶</div>
  `;
  player.onclick = () => renderPlayer(videoUrl);
}

// Player logic
function renderPlayer(url) {

  if (!url) return;

  if (url.includes("youtube") || url.includes("youtu.be")) {
    const id = url.match(/(?:v=|youtu\.be\/)([^&]+)/)?.[1];
    player.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }

  else if (url.includes("vimeo")) {
    const id = url.split("/").pop();
    player.innerHTML = `<iframe src="https://player.vimeo.com/video/${id}" allowfullscreen></iframe>`;
  }

  else if (url.includes("drive.google.com")) {
    const id = url.match(/\/d\/(.*?)\//)?.[1];
    player.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" allowfullscreen></iframe>`;
  }

  else {
    player.innerHTML = `<video controls autoplay src="${url}"></video>`;
  }
}

// Similar
async function loadSimilar(currentId) {
  const { data } = await supabase
    .from("movies")
    .select("*")
    .neq("id", currentId)
    .limit(8);

  similarEl.innerHTML = data.map(m => `
    <div class="card">
      <img src="${m.poster}" onclick="location.href='?id=${m.id}'">
    </div>
  `).join("");
}

// Buttons
document.getElementById("watchBtn").onclick = () => {
  if (movie) renderPlayer(movie.video);
};

document.getElementById("trailerBtn").onclick = () => {
  if (!movie || !movie.trailer) return alert("No trailer");
  renderPlayer(movie.trailer);
};

document.getElementById("shareBtn").onclick = () => {
  const url = "https://kingvj.netlify.app";
  const text = `🎬 Watch movies on Busanso Nation\n\n🔥 ${url}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
};

// Init
loadMovie();
lucide.createIcons();
</script>

</body>
</html>
