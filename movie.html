<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Busanso Nation - Watch</title>

<style>
body {
  margin: 0;
  background: #0a0a0f;
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
}

.header {
  padding: 15px;
  font-size: 20px;
  color: #22c55e;
  font-weight: bold;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 10px;
}

.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  position: relative;
}

.poster {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.playOverlay {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 50px;
  cursor: pointer;
  background: rgba(0,0,0,0.4);
}

.meta {
  padding: 15px;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

.desc {
  margin-top: 10px;
  color: #ccc;
}

.views {
  margin-top: 10px;
  color: #aaa;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 14px;
}

/* ▶ Watch */
#watchBtn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #000;
  box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
}

#watchBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(34, 197, 94, 0.6);
}

/* 🔗 Share */
#shareBtn {
  background: #1f2937;
  color: #fff;
  border: 1px solid #374151;
}

#shareBtn:hover {
  background: #374151;
  transform: translateY(-2px);
}

/* 🎞 Trailer */
#trailerBtn {
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #000;
  box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
}

#trailerBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(249, 115, 22, 0.6);
}

.similar {
  margin-top: 30px;
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
  gap: 10px;
}

.card img {
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">🎬 Busanso Nation</div>

<div class="container">

  <div class="player" id="player"></div>

  <div class="meta">
    <div class="title" id="title">Loading...</div>
    <div class="desc" id="desc"></div>
    <div class="views" id="views"></div>

<button id="watchBtn">
  <i data-lucide="play"></i>
  Watch
</button>

<button id="trailerBtn">
  <i data-lucide="film"></i>
  Trailer
</button>

<button id="shareBtn">
  <i data-lucide="share-2"></i>
  Share
</button>

  <div class="similar">
    <h3>Similar Movies</h3>
    <div class="grid" id="similar"></div>
  </div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://dhkfhhybzcxdeoalcfqx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY"
);
const firebaseConfig = {
  apiKey:"AIzaSyBGGV9F3Nv13nRJ8t4QCP5Y0IosmKfYz1s",
  authDomain:"busanso-pins.firebaseapp.com",
  databaseURL:"https://busanso-pins-default-rtdb.firebaseio.com",
  projectId:"busanso-pins"
};

const params = new URLSearchParams(window.location.search);
const movieId = params.get("id");

const player = document.getElementById("player");
const titleEl = document.getElementById("title");
const descEl = document.getElementById("desc");
const viewsEl = document.getElementById("views");
const similarEl = document.getElementById("similar");

let movie = null;

async function loadMovie() {

  const { data } = await supabase
    .from("movies")
    .select("*")
    .eq("id", movieId)
    .single();

  if (!data) {
    titleEl.textContent = "Movie not found";
    return;
  }

  movie = data;

  titleEl.textContent = data.title;

 descEl.textContent = data.synopsis || "No description";

  viewsEl.textContent = (data.views || 0) + " views";

  showPoster(data.poster, data.video);

  await supabase
    .from("movies")
    .update({ views: (data.views || 0) + 1 })
    .eq("id", data.id);

  loadSimilar(data.id);
}

// 🎬 Poster preload
function showPoster(poster, videoUrl) {

  player.innerHTML = `
    <img src="${poster}" class="poster">
    <div class="playOverlay">▶</div>
  `;

  player.onclick = () => {
    renderPlayer(videoUrl);
  };
}

// 🎬 Player switch
function renderPlayer(url) {

  if (url.includes("youtube") || url.includes("youtu.be")) {
    const id = url.match(/(?:v=|youtu\.be\/)([^&]+)/)?.[1];
    player.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }

  else if (url.includes("vimeo")) {
    const id = url.split("/").pop();
    player.innerHTML = `<iframe src="https://player.vimeo.com/video/${id}" allowfullscreen></iframe>`;
  }

  else if (url.includes("drive.google.com")) {
    const id = url.match(/\/d\/(.*?)\//)?.[1];
    player.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" allowfullscreen></iframe>`;
  }

  else {
    player.innerHTML = `<video controls autoplay src="${url}"></video>`;
  }
}

// 🎞 Similar movies

similarEl.innerHTML = data.map(m => {

  const isPremiumUser = !!localStorage.getItem("activePIN");
  const isLocked = m.premium === true && !isPremiumUser;

  return `
    <div class="card" style="position:relative;">

      <img src="${m.poster}"
           onclick="${isLocked ? `location.href='packages.html'` : `location.href='?id=${m.id}'`}">

      ${isLocked ? `
        <div style="
          position:absolute;
          inset:0;
          backdrop-filter: blur(6px);
          background: rgba(0,0,0,0.6);
          display:flex;
          flex-direction:column;
          justify-content:center;
          align-items:center;
          gap:6px;
          border-radius:6px;
        ">
          <div style="font-size:24px;">🔒</div>
          <div style="color:#22c55e;">Premium</div>
        </div>
      ` : ""}

    </div>
  `;

}).join("");
}

// 🔗 SHARE SITE (FIXED)
document.getElementById("shareBtn").onclick = () => {

  const siteURL = "https://kingvj.netlify.app"; // 👈 CHANGE THIS

const text =
`🎬 Watch movies on Busanso Nation

🔥 Stream now:
${siteURL}`;

window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
};

// 🎞 Trailer
document.getElementById("trailerBtn").onclick = () => {

  if (!movie || !movie.trailer) {
    alert("Trailer not available");
    return;
  }

  renderPlayer(movie.trailer);
  window.scrollTo({ top: 0, behavior: "smooth" });
};

// ▶ Watch (FIXED)
document.getElementById("watchBtn").onclick = () => {

  if (!movie) return;

  renderPlayer(movie.video);
  window.scrollTo({ top: 0, behavior: "smooth" });
};

loadMovie();
</script>

<script src="https://unpkg.com/lucide@latest"></script>

  lucide.createIcons();
</script>

</body>
</html>
