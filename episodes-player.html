<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busanso Nation - Episodes</title>

<style>
body {
  margin: 0;
  background: #070A12;
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(10,14,28,0.9);
  backdrop-filter: blur(10px);
  padding: 12px 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #1e293b;
  z-index: 10;
}

.backBtn {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: #111827;
  border: 1px solid #1f2937;
  color: #60a5fa;
  font-size: 18px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

/* PLAYER */
.player {
  width: 100%;
  aspect-ratio: 16/9;
  background: black;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  position: relative;
}

.player iframe,
.player video {
  width: 100%;
  height: 100%;
  border: none;
}

/* OVERLAY PLAY */
.playOverlay {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 50px;
  background: rgba(0,0,0,0.35);
  cursor: pointer;
}

/* NAV CONTROLS */
.episodeNav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  gap: 10px;
}

.navBtn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #1f2937;
  background: #0f172a;
  color: #e2e8f0;
  cursor: pointer;
  transition: 0.2s;
}

.navBtn:hover {
  background: #111827;
  transform: translateY(-1px);
}

.epLabel {
  flex: 2;
  text-align: center;
  font-weight: bold;
  color: #60a5fa;
}

/* FULLSCREEN BUTTON */
.fullBtn {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* COMMENTS */
.commentsBox {
  margin-top: 25px;
  background: #0b1220;
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 15px;
}

.commentsTitle {
  font-size: 16px;
  margin-bottom: 10px;
  color: #60a5fa;
}

/* INPUTS */
.commentForm input,
.commentForm textarea {
  width: 100%;
  margin-top: 8px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #1f2937;
  background: #0f172a;
  color: white;
  outline: none;
}

.commentForm textarea {
  min-height: 80px;
  resize: none;
}

/* POST BUTTON */
#postComment {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  font-weight: bold;
  cursor: pointer;
}

/* COMMENT CARD */
.commentItem {
  margin-top: 12px;
  padding: 12px;
  background: #0f172a;
  border: 1px solid #1f2937;
  border-radius: 12px;
}

.commentUser {
  color: #60a5fa;
  font-weight: bold;
}

.commentText {
  margin-top: 6px;
  color: #d1d5db;
  font-size: 14px;
}

.commentDate {
  font-size: 12px;
  color: #6b7280;
}
.commentToggleBtn {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #1f2937;
  background: #0f172a;
  color: #60a5fa;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.commentToggleBtn:hover {
  background: #111827;
  transform: translateY(-1px);
}
.footer {
  margin-top: 40px;
  padding: 25px;
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  border-top: 1px solid #1f2937;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button class="backBtn" onclick="history.back()">←</button>
  <span id="seriesTitle">Loading...</span>
</div>

<div class="container">

  <!-- PLAYER -->
  <div class="player" id="player"></div>

  <!-- NAV -->
  <div class="episodeNav">
    <button class="navBtn" id="prevEp">⬅ Prev</button>
    <div class="epLabel" id="epLabel">Episode</div>
    <button class="navBtn" id="nextEp">Next ➡</button>
  </div>

  <!-- FULLSCREEN -->
  <button class="fullBtn" id="fullBtn">⛶ Fullscreen</button>

  <!-- COMMENTS -->
 <div class="commentsBox">

  <div class="commentsTitle">💬 Comments</div>

  <!-- NEW BUTTON -->
  <button id="openCommentBox" class="commentToggleBtn">
    💬 Comment on this episode
  </button>

  <!-- HIDDEN FORM -->
  <div class="commentForm" id="commentForm" style="display:none;">
    <input id="username" placeholder="Your name">
    <textarea id="commentText" placeholder="Write your comment..."></textarea>
    <button id="postComment">Post Comment</button>
  </div>

  <div id="commentsList"></div>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dhkfhhybzcxdeoalcfqx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY"
);
const firebaseConfig = {
  apiKey:"AIzaSyBGGV9F3Nv13nRJ8t4QCP5Y0IosmKfYz1s",
  authDomain:"busanso-pins.firebaseapp.com",
  databaseURL:"https://busanso-pins-default-rtdb.firebaseio.com",
  projectId:"busanso-pins"
};

/* STATE */
const params = new URLSearchParams(window.location.search);
const seriesId = params.get("id");

let episodes = [];
let index = 0;

/* =========================
   PLAYER (UNCHANGED LOGIC)
========================= */
function renderPlayer(url) {

  const player = document.getElementById("player");

  if (url.includes("youtube") || url.includes("youtu.be")) {
    const id = url.match(/(?:v=|youtu\.be\/)([^&]+)/)?.[1];
    player.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }

  else if (url.includes("vimeo")) {
    const id = url.split("/").pop();
    player.innerHTML = `<iframe src="https://player.vimeo.com/video/${id}" allowfullscreen></iframe>`;
  }

  else {
  player.innerHTML = `
    <video id="videoPlayer" controls autoplay src="${url}"></video>
  `;

  const video = document.getElementById("videoPlayer");

  video.onended = () => {
    if (index < episodes.length - 1) {
      loadEpisode(index + 1);
     }
   };
 }
}
async function checkAccess(seriesType) {

  // FREE CONTENT = always allowed
  if (seriesType === "free") return true;

  // CHECK PIN FROM LOCAL STORAGE FIRST
  const pin = localStorage.getItem("activePIN");
  const pinExpiry = localStorage.getItem("pinExpiry");

  if (!pin || !pinExpiry) {
    return false;
  }

  // check expiry
  const now = Date.now();

  if (now > parseInt(pinExpiry)) {
    localStorage.removeItem("activePIN");
    localStorage.removeItem("pinExpiry");
    return false;
  }

  return true;
}
/* LOAD EPISODES */
async function loadEpisodes() {

  // 1. GET SERIES INFO (FIRST THING)
  const { data: series } = await supabase
    .from("series")
    .select("type, title")
    .eq("id", seriesId)
    .single();

  if (!series) {
    window.location.href = "packages.html";
    return;
  }

  // 2. SECURITY CHECK
  const allowed = await checkAccess(series.type);

  if (!allowed) {
    window.location.href = "packages.html";
    return;
  }

  // 3. LOAD EPISODES
  const { data } = await supabase
    .from("episodes")
    .select("*")
    .eq("series_id", seriesId)
    .order("episode_number", { ascending: true });

  episodes = data || [];

  if (!episodes.length) return;

  // 4. HEADER TITLE
  document.getElementById("seriesTitle").textContent =
    series.title || "Busanso Episodes";

  // 5. RESTORE LAST WATCHED EPISODE
  const savedIndex = localStorage.getItem("busanso_last_episode");

  if (savedIndex !== null && episodes[savedIndex]) {
    loadEpisode(parseInt(savedIndex));
  } else {
    loadEpisode(0);
  }
}

/* LOAD EPISODE */
function loadEpisode(i) {

  index = i;

  localStorage.setItem("busanso_last_episode", i); // 👈 ADD THIS

  const ep = episodes[i];
  if (!ep) return;

  document.getElementById("epLabel").textContent =
    `Episode ${ep.episode_number}`;

  renderPlayer(ep.video);
  loadComments(ep.id);
}

/* COMMENTS */
async function loadComments(epId) {

  const { data } = await supabase
    .from("episode_comments")
    .select("*")
    .eq("episode_id", epId)
    .order("created_at", { ascending: false });

  document.getElementById("commentsList").innerHTML =
    (data || []).map(c => `
      <div class="commentItem">
        <div class="commentUser">${c.user_name}</div>
        <div class="commentText">${c.comment}</div>
      </div>
    `).join("");
}

/* POST COMMENT */
document.getElementById("postComment").onclick = async () => {

  const user = document.getElementById("username").value.trim();
  const comment = document.getElementById("commentText").value.trim();

  if (!user || !comment) return;

  const ep = episodes[index];

  await supabase.from("episode_comments").insert([{
    episode_id: ep.id,
    user_name: user,
    comment
  }]);

  loadComments(ep.id);
};

/* NAV */
document.getElementById("nextEp").onclick = () => {
  if (index < episodes.length - 1) loadEpisode(index + 1);
};

document.getElementById("prevEp").onclick = () => {
  if (index > 0) loadEpisode(index - 1);
};

/* FULLSCREEN */
document.getElementById("fullBtn").onclick = () => {
  const el = document.getElementById("player");

  if (!document.fullscreenElement) el.requestFullscreen();
  else document.exitFullscreen();
};

/* 💬 COMMENT TOGGLE (PASTE HERE) */
document.getElementById("openCommentBox").onclick = () => {

  const form = document.getElementById("commentForm");

  if (!form) return;

  form.style.display =
    form.style.display === "none" ? "block" : "none";
};

/* INIT */
loadEpisodes();

</script>
<footer class="footer">
  <p>© 2026 Busanso Nation. All rights reserved.</p>
  <p>Thank you for choosing Busanso Nation ❤️</p>
</footer>
</body>
</html>
