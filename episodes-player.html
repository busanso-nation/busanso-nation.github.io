<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busanso Nation - Episodes</title>

<style>
body{
  margin:0;
  background:#070A12;
  color:white;
  font-family:'Segoe UI',sans-serif;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:rgba(10,14,28,0.95);
  backdrop-filter:blur(12px);
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  border-bottom:1px solid #1e293b;
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.45);
}

/* LOGO */
.logo{
  width:72px;
  height:42px;
  border-radius:12px;
  object-fit:cover;
  box-shadow:0 0 15px rgba(37,99,235,0.55);
}

/* BACK BUTTON */
.backBtn{
  width:42px;
  height:42px;
  border-radius:12px;
  background:#111827;
  border:1px solid #334155;
  color:#60a5fa;
  font-size:20px;
  cursor:pointer;
  transition:0.25s;
}

.backBtn:hover{
  transform:scale(1.06);
  background:#172033;
  box-shadow:0 0 15px rgba(96,165,250,0.45);
}

/* SERIES TITLE */
#seriesTitle{
  font-size:36px;
  font-weight:800;
  color:white;
  letter-spacing:0.3px;
  text-shadow:0 0 18px rgba(96,165,250,0.4);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* CONTAINER */
.container{
  max-width:1250px;
  margin:auto;
  padding:18px;
}

/* PLAYER */
.player{
  width:100%;
  min-height:78vh;
  background:black;
  border-radius:22px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 25px 70px rgba(0,0,0,0.75),
    0 0 35px rgba(37,99,235,0.2);
}

.player iframe,
.player video{
  width:100%;
  height:100%;
  border:none;
}

/* NAV CONTROLS */
.episodeNav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
  gap:14px;
}

/* GLOW BUTTONS */
.navBtn{
  flex:1;
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(96,165,250,0.35);
  background:linear-gradient(135deg,#111827,#172033);
  color:#ffffff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
  box-shadow:
    0 0 12px rgba(96,165,250,0.25),
    inset 0 0 10px rgba(255,255,255,0.03);
}

.navBtn:hover{
  transform:translateY(-2px) scale(1.01);
  background:linear-gradient(135deg,#172033,#1e293b);
  box-shadow:
    0 0 22px rgba(96,165,250,0.65),
    0 0 40px rgba(37,99,235,0.35);
}

.epLabel{
  flex:2;
  text-align:center;
  font-weight:800;
  font-size:20px;
  color:red;
  text-shadow:0 0 12px rgba(96,165,250,0.45);
}

/* FULLSCREEN BUTTON */
.fullBtn{
  margin-top:14px;
  width:100%;
  padding:15px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;
  color:white;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 0 18px rgba(37,99,235,0.4);
}

.fullBtn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 28px rgba(37,99,235,0.7);
}

/* COMMENTS */
.commentsBox{
  margin-top:30px;
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.commentsTitle{
  font-size:18px;
  margin-bottom:12px;
  color:#60a5fa;
  font-weight:700;
}

/* INPUTS */
.commentForm input,
.commentForm textarea{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:1px solid #1f2937;
  background:#0f172a;
  color:white;
  outline:none;
  font-size:15px;
  box-sizing:border-box;
}

.commentForm textarea{
  min-height:90px;
  resize:none;
}

/* POST BUTTON */
#postComment{
  margin-top:12px;
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:800;
  color:white;
  cursor:pointer;
  font-size:15px;
  transition:0.25s;
}

#postComment:hover{
  transform:translateY(-1px);
  box-shadow:0 0 20px rgba(34,197,94,0.5);
}

/* COMMENT CARD */
.commentItem{
  margin-top:14px;
  padding:14px;
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:14px;
}

.commentUser{
  color:#60a5fa;
  font-weight:bold;
}

.commentText{
  margin-top:8px;
  color:#d1d5db;
  font-size:14px;
  line-height:1.5;
}

/* TOGGLE BTN */
.commentToggleBtn{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(96,165,250,0.35);
  background:#0f172a;
  color:#60a5fa;
  font-weight:800;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 0 12px rgba(96,165,250,0.15);
}

.commentToggleBtn:hover{
  background:#111827;
  transform:translateY(-1px);
  box-shadow:0 0 20px rgba(96,165,250,0.4);
}

.footer{
  margin-top:40px;
  padding:25px;
  text-align:center;
  font-size:13px;
  color:#94a3b8;
  border-top:1px solid #1f2937;
}

/* MOBILE */
@media(max-width:768px){

  #seriesTitle{
    font-size:20px;
  }

  .player{
    min-height:42vh;
    border-radius:18px;
  }

  .episodeNav{
    flex-direction:column;
  }

  .navBtn,
  .epLabel{
    width:100%;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <!-- LOGO -->
  <img src="https://i.ibb.co/1GMMrMmS/logo.png" class="logo">

  <button class="backBtn" onclick="history.back()">←</button>

  <span id="seriesTitle">Loading...</span>
</div>
<div class="container">

  <!-- PLAYER -->
  <div class="player" id="player"></div>

  <!-- NAV -->
  <div class="episodeNav">
    <button class="navBtn" id="prevEp">⬅ Prev</button>
    <div class="epLabel" id="epLabel">Episode</div>
    <button class="navBtn" id="nextEp">Next ➡</button>
  </div>

  <!-- FULLSCREEN -->
  <button class="fullBtn" id="fullBtn">⛶ Fullscreen</button>

  <!-- COMMENTS -->
 <div class="commentsBox">

  <div class="commentsTitle">💬 Comments</div>

  <!-- NEW BUTTON -->
  <button id="openCommentBox" class="commentToggleBtn">
    💬 Comment on this episode
  </button>

  <!-- HIDDEN FORM -->
  <div class="commentForm" id="commentForm" style="display:none;">
    <input id="username" placeholder="Your name">
    <textarea id="commentText" placeholder="Write your comment..."></textarea>
    <button id="postComment">Post Comment</button>
  </div>

  <div id="commentsList"></div>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dhkfhhybzcxdeoalcfqx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY"
);
const firebaseConfig = {
  apiKey:"AIzaSyBGGV9F3Nv13nRJ8t4QCP5Y0IosmKfYz1s",
  authDomain:"busanso-pins.firebaseapp.com",
  databaseURL:"https://busanso-pins-default-rtdb.firebaseio.com",
  projectId:"busanso-pins"
};
/* STATE */
const params = new URLSearchParams(window.location.search);
const seriesId = params.get("id");

let episodes = [];
let index = 0;

/* =========================
   PLAYER (UNCHANGED LOGIC)
========================= */
function renderPlayer(url) {

  const player = document.getElementById("player");
  let embedUrl = null;

  /* =========================
     YOUTUBE (ALL FORMATS)
  ========================= */
  if (url.includes("youtube.com") || url.includes("youtu.be")) {

    let videoId = null;

    if (url.includes("youtu.be")) {
      videoId = url.split("youtu.be/")[1]?.split("?")[0];
    }

    if (url.includes("watch?v=")) {
      videoId = new URL(url).searchParams.get("v");
    }

    if (url.includes("/embed/")) {
      videoId = url.split("/embed/")[1]?.split("?")[0];
    }

    if (videoId) {
      embedUrl = `https://www.youtube.com/embed/${videoId}`;
    }
  }

  /* =========================
     VIMEO (FIXED)
  ========================= */
  else if (url.includes("vimeo.com")) {

    const match = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    const videoId = match ? match[1] : null;

    if (videoId) {
      embedUrl = `https://player.vimeo.com/video/${videoId}`;
    }
  }

  /* =========================
     GOOGLE DRIVE (FIXED)
  ========================= */
  else if (url.includes("drive.google.com")) {

    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const fileId = match ? match[1] : null;

    if (fileId) {
      embedUrl = `https://drive.google.com/file/d/${fileId}/preview`;
    }
  }

  /* =========================
     DIRECT VIDEO FILE
  ========================= */
  else {
    player.innerHTML = `
      <video id="videoPlayer" controls autoplay src="${url}"></video>
    `;

    const video = document.getElementById("videoPlayer");

    video.onended = () => {
      if (index < episodes.length - 1) {
        loadEpisode(index + 1);
      }
    };

    return;
  }

  /* =========================
     EMBED PLAYER OUTPUT
  ========================= */
  player.innerHTML = `
    <iframe
      src="${embedUrl}"
      frameborder="0"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  `;
}
async function checkAccess(seriesType) {

  // FREE CONTENT = always allowed
  if (seriesType === "free") return true;

  // CHECK PIN FROM LOCAL STORAGE FIRST
  const pin = localStorage.getItem("activePIN");
  const pinExpiry = localStorage.getItem("pinExpiry");

  if (!pin || !pinExpiry) {
    return false;
  }

  // check expiry
  const now = Date.now();

  if (now > parseInt(pinExpiry)) {
    localStorage.removeItem("activePIN");
    localStorage.removeItem("pinExpiry");
    return false;
  }

  return true;
}
/* LOAD EPISODES */
async function loadEpisodes() {

  // 1. GET SERIES INFO (FIRST THING)
  const { data: series } = await supabase
    .from("series")
    .select("type, title")
    .eq("id", seriesId)
    .single();

  if (!series) {
    window.location.href = "packages.html";
    return;
  }

  // 2. SECURITY CHECK
  const allowed = await checkAccess(series.type);

  if (!allowed) {
    window.location.href = "packages.html";
    return;
  }

  // 3. LOAD EPISODES
  const { data } = await supabase
    .from("episodes")
    .select("*")
    .eq("series_id", seriesId)
    .order("episode_number", { ascending: true });

  episodes = data || [];

  if (!episodes.length) return;

  // 4. HEADER TITLE
  document.getElementById("seriesTitle").textContent =
    series.title || "Busanso Episodes";

  // 5. RESTORE LAST WATCHED EPISODE
  const savedIndex = localStorage.getItem("busanso_last_episode");

  if (savedIndex !== null && episodes[savedIndex]) {
    loadEpisode(parseInt(savedIndex));
  } else {
    loadEpisode(0);
  }
}

/* LOAD EPISODE */
function loadEpisode(i) {

  index = i;

  localStorage.setItem("busanso_last_episode", i); // 👈 ADD THIS

  const ep = episodes[i];
  if (!ep) return;

  document.getElementById("epLabel").textContent =
    `Episode ${ep.episode_number}`;

  renderPlayer(ep.video);
  loadComments(ep.id);
}

/* COMMENTS */
async function loadComments(epId) {

  const { data } = await supabase
    .from("episode_comments")
    .select("*")
    .eq("episode_id", epId)
    .order("created_at", { ascending: false });

  document.getElementById("commentsList").innerHTML =
    (data || []).map(c => `
      <div class="commentItem">
        <div class="commentUser">${c.user_name}</div>
        <div class="commentText">${c.comment}</div>
      </div>
    `).join("");
}

/* POST COMMENT */
document.getElementById("postComment").onclick = async () => {

  const user = document.getElementById("username").value.trim();
  const comment = document.getElementById("commentText").value.trim();

  if (!user || !comment) return;

  const ep = episodes[index];

  await supabase.from("episode_comments").insert([{
    episode_id: ep.id,
    user_name: user,
    comment
  }]);

  loadComments(ep.id);
};

/* NAV */
document.getElementById("nextEp").onclick = () => {
  if (index < episodes.length - 1) loadEpisode(index + 1);
};

document.getElementById("prevEp").onclick = () => {
  if (index > 0) loadEpisode(index - 1);
};

/* FULLSCREEN */
document.getElementById("fullBtn").onclick = () => {
  const el = document.getElementById("player");

  if (!document.fullscreenElement) el.requestFullscreen();
  else document.exitFullscreen();
};

/* 💬 COMMENT TOGGLE (PASTE HERE) */
document.getElementById("openCommentBox").onclick = () => {

  const form = document.getElementById("commentForm");

  if (!form) return;

  form.style.display =
    form.style.display === "none" ? "block" : "none";
};

/* INIT */
loadEpisodes();

</script>
<footer class="footer">
  <p>© 2026 Busanso Nation. All rights reserved.</p>
  <p>Thank you for choosing Busanso Nation ❤️</p>
</footer>
</body>
</html>
