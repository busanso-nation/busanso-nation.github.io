<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busanso Nation - Episodes</title>

<style>
body{
  margin:0;
  background:#070A12;
  color:white;
  font-family:'Segoe UI',sans-serif;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:rgba(10,14,28,0.95);
  backdrop-filter:blur(12px);
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  border-bottom:1px solid #1e293b;
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.45);
}

/* LOGO */
.logo{
  width:72px;
  height:42px;
  border-radius:12px;
  object-fit:cover;
  box-shadow:0 0 15px rgba(37,99,235,0.55);
}

/* BACK BUTTON */
.backBtn{
  width:42px;
  height:42px;
  border-radius:12px;
  background:#111827;
  border:1px solid #334155;
  color:#60a5fa;
  font-size:20px;
  cursor:pointer;
  transition:0.25s;
}

.backBtn:hover{
  transform:scale(1.06);
  background:#172033;
  box-shadow:0 0 15px rgba(96,165,250,0.45);
}

/* SERIES TITLE */
#seriesTitle{
  font-size:36px;
  font-weight:800;
  color:white;
  letter-spacing:0.3px;
  text-shadow:0 0 18px rgba(96,165,250,0.4);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* CONTAINER */
.container{
  max-width:1250px;
  margin:auto;
  padding:18px;
}

/* PLAYER */
.player{
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:22px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 25px 70px rgba(0,0,0,0.75),
    0 0 35px rgba(37,99,235,0.2);
}


/* FORCE EMBEDS TO FILL */
.player iframe,
.player video{
  width:100%;
  height:100%;
  display:block;
  border:none;
}

/* NAV CONTROLS */
.episodeNav{
  display:flex;
  flex-direction:row;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
  gap:14px;
  flex-wrap:nowrap;
}

/* BUTTONS */
.navBtn{
  flex:1;
  min-width:140px;
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(96,165,250,0.35);
  background:linear-gradient(135deg,#111827,#172033);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
  box-shadow:
    0 0 12px rgba(96,165,250,0.25),
    inset 0 0 10px rgba(255,255,255,0.03);
}

.navBtn:hover{
  transform:translateY(-2px) scale(1.01);
  background:linear-gradient(135deg,#172033,#1e293b);
  box-shadow:
    0 0 22px rgba(96,165,250,0.65),
    0 0 40px rgba(37,99,235,0.35);
}

.epLabel{
  flex:1.2;
  text-align:center;
  font-weight:800;
  font-size:22px;
  color:#60a5fa;
  white-space:nowrap;
  text-shadow:0 0 12px rgba(96,165,250,0.45);
}

/* FULLSCREEN BUTTON */
.fullBtn{
  margin-top:14px;
  width:100%;
  padding:15px;
  border-radius:16px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;
  color:white;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 0 18px rgba(37,99,235,0.4);
}

.fullBtn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 28px rgba(37,99,235,0.7);
}

/* COMMENTS */
.commentsBox{
  margin-top:30px;
  background:#0b1220;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.commentsTitle{
  font-size:18px;
  margin-bottom:12px;
  color:#60a5fa;
  font-weight:700;
}

/* INPUTS */
.commentForm input,
.commentForm textarea{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:1px solid #1f2937;
  background:#0f172a;
  color:white;
  outline:none;
  font-size:15px;
  box-sizing:border-box;
}

.commentForm textarea{
  min-height:90px;
  resize:none;
}

/* POST BUTTON */
#postComment{
  margin-top:12px;
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:800;
  color:white;
  cursor:pointer;
  font-size:15px;
  transition:0.25s;
}

#postComment:hover{
  transform:translateY(-1px);
  box-shadow:0 0 20px rgba(34,197,94,0.5);
}
.episodeItem{
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  background:#111827;
  cursor:pointer;
  border:1px solid #1f2937;
}

.episodeItem:hover{
  background:#172033;
}

.episodeItem.active{
  border:1px solid #60a5fa;
  box-shadow:0 0 10px rgba(96,165,250,.4);
}

/* COMMENT CARD */
.commentItem{
  margin-top:14px;
  padding:14px;
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:14px;
}

.commentUser{
  color:#60a5fa;
  font-weight:bold;
}

.commentText{
  margin-top:8px;
  color:#d1d5db;
  font-size:14px;
  line-height:1.5;
}
.commentActions{
  margin-top:12px;
  display:flex;
  gap:10px;
}

.commentActions button{
  background:#111827;
  border:1px solid #334155;
  color:white;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}


.replyBox{
  margin-top:12px;
}

.replyBox textarea{
  width:100%;
  min-height:60px;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
  border-radius:10px;
  padding:10px;
  box-sizing:border-box;
}


.replyItem{
  margin-top:12px;
  margin-left:20px;
  padding:12px;
  background:#111827;
  border-radius:12px;
  border-left:3px solid #60a5fa;
}

/* TOGGLE BTN */
.commentToggleBtn{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(96,165,250,0.35);
  background:#0f172a;
  color:#60a5fa;
  font-weight:800;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 0 12px rgba(96,165,250,0.15);
}

.commentToggleBtn:hover{
  background:#111827;
  transform:translateY(-1px);
  box-shadow:0 0 20px rgba(96,165,250,0.4);
}

.footer{
  margin-top:40px;
  padding:25px;
  text-align:center;
  font-size:13px;
  color:#94a3b8;
  border-top:1px solid #1f2937;
}





/* MOBILE */
@media(max-width:768px){

  #seriesTitle{
    font-size:20px;
  }

  .player{
    aspect-ratio:16/9;
    border-radius:18px;
  }

  /* KEEP NAV IN ONE ROW */
  .episodeNav{
    flex-direction:row;
    gap:8px;
  }

  .navBtn{
    min-width:auto;
    padding:12px 8px;
    font-size:14px;
  }

  .epLabel{
    font-size:16px;
  }
  .criticalExpiry{
  animation:shakeFlash 0.6s infinite;
  border:3px solid red !important;
  box-shadow:0 0 25px red !important;
}

@keyframes shakeFlash{
  0% {transform: translateX(0); background:#7f1d1d;}
  25% {transform: translateX(-2px); background:#991b1b;}
  50% {transform: translateX(2px); background:#dc2626;}
  75% {transform: translateX(-2px); background:#b91c1c;}
  100% {transform: translateX(0); background:#7f1d1d;}
}
  .subscriptionAlert{
  margin-bottom:15px;
  padding:18px;
  border-radius:16px;
  text-align:center;
  font-weight:800;
  font-size:18px;
  animation:pulseAlert 2s infinite;
}

@keyframes pulseAlert{
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}
}
</style>

function renderPlayer(url) {

  const player = document.getElementById("player");
  let embedUrl = null;

  /* =========================
     YOUTUBE (ALL FORMATS)
  ========================= */
  if (url.includes("youtube.com") || url.includes("youtu.be")) {

    let videoId = null;

    if (url.includes("youtu.be")) {
      videoId = url.split("youtu.be/")[1]?.split("?")[0];
    }

    if (url.includes("watch?v=")) {
      videoId = new URL(url).searchParams.get("v");
    }

    if (url.includes("/embed/")) {
      videoId = url.split("/embed/")[1]?.split("?")[0];
    }

    if (videoId) {
      embedUrl = `https://www.youtube.com/embed/${videoId}`;
    }
  }

  /* =========================
     VIMEO (FIXED)
  ========================= */
  else if (url.includes("vimeo.com")) {

    const match = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
    const videoId = match ? match[1] : null;

    if (videoId) {
      embedUrl = `https://player.vimeo.com/video/${videoId}`;
    }
  }

  /* =========================
     GOOGLE DRIVE (FIXED)
  ========================= */
  else if (url.includes("drive.google.com")) {

    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const fileId = match ? match[1] : null;

    if (fileId) {
      embedUrl = `https://drive.google.com/file/d/${fileId}/preview`;
    }
  }

 /* =========================
   DAILYMOTION
========================= */
else if (
  url.includes("dailymotion.com") ||
  url.includes("dai.ly") ||
  /^[a-zA-Z0-9]+$/.test(url)
) {

  let videoId = null;

  // direct ID only
  if (/^[a-zA-Z0-9]+$/.test(url)) {
    videoId = url;
  }

  // short URL
  else if (url.includes("dai.ly/")) {
    videoId = url.split("dai.ly/")[1].split("?")[0];
  }

  // normal URL
  else {
    const match = url.match(/video\/([a-zA-Z0-9]+)/);
    videoId = match ? match[1] : null;
  }

  if (videoId) {
    embedUrl = `https://www.dailymotion.com/embed/video/${videoId}`;
  }
}
/* =========================
   BUNNY.NET VIDEO
========================= */
else if (url.includes("b-cdn.net")) {

  player.innerHTML = `

      controls
      controlsList="nodownload"
      disablePictureInPicture
      autoplay
      playsinline

async function checkAccess(seriesType) {

  // FREE CONTENT = always allowed
  if (seriesType === "free") return true;

  const pin = localStorage.getItem("activePIN");
  const pinExpiry = localStorage.getItem("pinExpiry");

  if (!pin || !pinExpiry) return false;

  const now = Date.now();

  if (now > parseInt(pinExpiry)) {
    localStorage.removeItem("activePIN");
    localStorage.removeItem("pinExpiry");
    return false;
  }

  return true;
}


/* =========================
   SUBSCRIPTION REMINDER
========================= */
function showSubscriptionReminder() {

  const alertBox = document.getElementById("subscriptionAlert");
  if (!alertBox) return;

  const expiry = localStorage.getItem("pinExpiry");
  if (!expiry) return;

  const msLeft = parseInt(expiry) - Date.now();
  const daysLeft = Math.ceil(msLeft / 86400000);

  if (daysLeft > 5) return;

  alertBox.style.display = "block";
  alertBox.className = "subscriptionAlert";

  // 2–5 DAYS LEFT
  if (daysLeft > 1) {

    alertBox.style.background = "#991b1b";

    alertBox.innerHTML = `
      🚨 Your subscription expires in <b>${daysLeft} days</b>.<br><br>
      <button class="renewBtn" onclick="location.href='packages.html'">
        Renew Subscription
      </button>
    `;
  }

  // 1 DAY LEFT (CRITICAL)
  else if (daysLeft === 1) {

    alertBox.style.background = "linear-gradient(135deg,#dc2626,#7f1d1d)";
    alertBox.style.boxShadow = "0 0 25px rgba(220,38,38,0.9)";
    alertBox.classList.add("criticalExpiry");

    alertBox.innerHTML = `
      🚨 FINAL WARNING 🚨<br><br>
      Your subscription EXPIRES TOMORROW.<br><br>
      <button class="renewBtn" onclick="location.href='packages.html'">
        RENEW NOW
      </button>
    `;

    setTimeout(() => {
      alertBox.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }, 1200);
  }

  // TODAY EXPIRES
  else {

    alertBox.style.background = "#ef4444";
    alertBox.style.fontSize = "22px";
    alertBox.classList.add("criticalExpiry");

    alertBox.innerHTML = `
      ⛔ LAST DAY OF ACCESS ⛔<br><br>
      Your subscription expires TODAY.<br><br>
      <button class="renewBtn" onclick="location.href='packages.html'">
        Renew Subscription Now
      </button>
    `;

    setTimeout(() => {
      alertBox.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }, 1200);
  }
}

/* =========================
   LOAD EPISODES
========================= */
async function loadEpisodes() {

  const { data: series } = await supabase
    .from("series")
    .select("type, title")
    .eq("id", seriesId)
    .single();

  if (!series) {
    window.location.href = "packages.html";
    return;
  }

  const allowed = await checkAccess(series.type);

  if (!allowed) {
    window.location.href = "packages.html";
    return;
  }

  // show reminder OR upsell
  if (series.type === "free") {
    showFreeUserUpsell();
  } else {
    showSubscriptionReminder();
  }

  const { data } = await supabase
    .from("episodes")
    .select("*")
    .eq("series_id", seriesId)
    .order("episode_number", { ascending: true });

  episodes = data || [];

  if (!episodes.length) return;

  document.getElementById("seriesTitle").textContent =
    series.title || "Busanso Episodes";

  const savedIndex = localStorage.getItem(
    `busanso_last_episode_${seriesId}`
  );

  if (savedIndex !== null && episodes[parseInt(savedIndex)]) {
    loadEpisode(parseInt(savedIndex));
  } else {
    loadEpisode(0);
  }
}

/* LOAD EPISODE */
function loadEpisode(i) {

  index = i;

  // SAVE LAST WATCHED EPISODE FOR THIS SERIES
  localStorage.setItem(
    `busanso_last_episode_${seriesId}`,
    i
  );

  const ep = episodes[i];
  if (!ep) return;

  document.getElementById("epLabel").textContent =
    `Episode ${ep.episode_number}`;

  renderPlayer(ep.video);
  loadComments(ep.id);

  renderEpisodeList();
}
function renderEpisodeList(){

  const list = document.getElementById("episodeList");

  list.innerHTML = episodes.map((ep,i)=>`
    <div
      class="episodeItem ${i===index?'active':''}"
      onclick="window.selectEpisode(${i})">

      Episode ${ep.episode_number}
      ${ep.title ? ' - ' + ep.title : ''}
    </div>
  `).join("");

}

window.selectEpisode = function(i){

  loadEpisode(i);

  // hide episode list
  document.getElementById("episodeList").style.display = "none";

  // scroll player into view

const yOffset = -(header?.offsetHeight || 80);

const y =
  player.getBoundingClientRect().top +
  window.pageYOffset +
  yOffset;

  top: y,
  behavior: "smooth"

};

window.likeComment = async function(id){

const { data, error } = await supabase
.from("episode_comments")
.select("likes")
.eq("id", id)
.single();

if(error){
  console.log(error);
  return;
}

const newLikes = (data.likes || 0) + 1;

const { error: updateError } = await supabase
.from("episode_comments")
.update({
  likes: newLikes
})
.eq("id", id);

if(updateError){
  console.log(updateError);
  return;
}

const counter = document.getElementById("likes-" + id);

if(counter){
  counter.textContent = newLikes;
}

};

/* POST COMMENT */
document.getElementById("postComment").onclick = async () => {

  const user = document.getElementById("username").value.trim();
  const comment = document.getElementById("commentText").value.trim();

  if (!user || !comment) return;

  const ep = episodes[index];

 await supabase.from("episode_comments").insert([{
  episode_id: ep.id,
  user_name: user,
  comment,
  created_at: new Date().toISOString()
}]);

  loadComments(ep.id);
};

/* NAV */
document.getElementById("nextEp").onclick = () => {
  if (index < episodes.length - 1) loadEpisode(index + 1);
};

document.getElementById("prevEp").onclick = () => {
  if (index > 0) loadEpisode(index - 1);
};

/* FULLSCREEN */
document.getElementById("fullBtn").onclick = async () => {

  const el = document.getElementById("player");

  try {

    if (!document.fullscreenElement) {

      await el.requestFullscreen();

      // wait a bit BEFORE locking orientation (important)
      setTimeout(async () => {

        try {
          if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock("landscape");
          }
        } catch (e) {
          console.log("Orientation lock failed:", e);
        }

      }, 300);

    } else {

      await document.exitFullscreen();

      try {
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      } catch (e) {}

    }

  } catch (err) {
    console.log(err);
  }

};

/* 💬 COMMENT TOGGLE */
document.getElementById("openCommentBox").onclick = () => {

  const form = document.getElementById("commentForm");

  if (!form) return;

  form.style.display =
    form.style.display === "none" ? "block" : "none";
};

/* EPISODE LIST TOGGLE */
document.getElementById("toggleEpisodes").onclick = () => {

  const box = document.getElementById("episodeList");

  box.style.display =
    box.style.display === "none"
      ? "block"
      : "none";
};
