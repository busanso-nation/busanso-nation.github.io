<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Busanso Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  background:#1a1a1a;
  padding:30px;
  border-radius:12px;
  width:90%;
  max-width:350px;
  text-align:center;
}
.header{
  color:#22c55e;
  font-weight:bold;
}
input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
  text-align:center;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#16a34a;
  font-weight:bold;
  cursor:pointer;
}
button:hover{background:#22c55e;}
.msg{
  margin-top:10px;
  font-size:14px;
  color:#ff4d4d;
}
.link{
  display:none;
  margin-top:10px;
  color:#60a5fa;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
  <div class="header">BUSANSO NATION</div>
  <h2>Enter Password</h2>

  <input id="phone" placeholder="WhatsApp Number">
  <input id="pin" placeholder="Enter Password">

  <button onclick="login()">Submit</button>

  <div class="msg" id="msg"></div>
  <div class="link" id="requestBtn" onclick="requestPin()">Request New Password</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://dhkfhhybzcxdeoalcfqx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY'
);

let attempts = 0;

// ✅ device ID generator
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

window.login = async function(){
  const phone = document.getElementById("phone").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");
  const requestBtn = document.getElementById("requestBtn");

  msg.textContent = "";

  if(!phone || !pin){
    msg.textContent = "Whatsap Number and Password required";
    return;
  }

  const deviceId = getDeviceId();

  const { data, error } = await supabase
    .from("special_pins")
    .select("*");

  if(error){
    msg.textContent = "Server error";
    console.log(error);
    return;
  }

  // ✅ strong match
  const record = data.find(p => String(p.pin).trim() === pin.trim());

  if(!record){
    attempts++;
    msg.textContent = "Wrong Password";

    if(attempts >= 2){
      requestBtn.style.display = "block";
    }

    if(attempts >= 3){
      setTimeout(()=>{ location.href = "packages.html"; }, 1500);
    }

    return;
  }

  const now = new Date();

  if(record.expires_at && new Date(record.expires_at) < now){
    msg.textContent = "Your Password expired";
    return;
  }

  if(record.is_used && record.device_id !== deviceId){
    msg.textContent = "Password already used";
    return;
  }

  if(!record.is_used){
    await supabase
      .from("special_pins")
      .update({
        is_used: true,
        device_id: deviceId,
        used_at: new Date(),
        phone: phone
      })
      .eq("id", record.id);
  }

  localStorage.setItem("kibandaAccess", "true");

  msg.style.color = "#00ff66";
  msg.textContent = "Correct Password, Taking you into Busanso";

  setTimeout(()=>{ location.href = "kibwatch.html"; }, 1000);
}

window.requestPin = function(){
  const msg = encodeURIComponent("Hello, I need a new PIN");
  window.open(`https://wa.me/256703888884?text=${msg}`);
}
</script>

</body>
</html>
