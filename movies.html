<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BUSANSO – Movies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing:border-box }
body {
  margin:0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:#e5e7eb;
  font-family:'Poppins', sans-serif;
  overflow-x:hidden;
}
.logo {
  display:flex;
  justify-content:center;
  padding:16px 10px 6px;
  z-index:10;
  position:relative;
}
.logo img {
  height:50px;
  border-radius:12px;
}
.card img{
  transition:.35s;
}

.card:hover img{
  transform:scale(1.05);
}
  .logo img {
  height:50px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(56,189,248,0.3);
}
.nav{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:12px;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}
.nav button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:18px;
  color:#fff;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 4px 12px rgba(0,0,0,.5);
  background:linear-gradient(135deg,#334155,#1e293b);
}
.nav button:nth-child(1){
  background:linear-gradient(135deg,#38bdf8,#3b82f6);
}

.nav button:nth-child(2){
  background:linear-gradient(135deg,#a855f7,#6366f1);
}

.nav button:nth-child(3){
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.search {
  padding:16px;
}
.search input, .search select {
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0f172a;
  color:#fff;
  font-size:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.4);
}

.movies{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:12px;
}

.card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}


.card:hover {
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 15px 35px rgba(0,0,0,.6);
}
.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
  display:block;
}
.badge {
  position:absolute;
  top:8px;
  left:8px;
  padding:4px 8px;
  font-size:10px;
  font-weight:bold;
  border-radius:6px;
  text-transform:uppercase;
  box-shadow:0 2px 10px rgba(0,0,0,.6);
}
.badge.free{background:#22c55e}
.badge.premium{background:#ef4444}
.info {
  padding:8px;
}
.title{
  color:#fbbf24;
  font-weight:700;
}
.meta {
  font-size:11px;
  color:#ccc;
  margin-bottom:6px;
}
.watch {
  width:100%;
  padding:9px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  font-weight:bold;
  font-size:12px;
  cursor:pointer;
  transition:.25s;
}
@media (min-width:768px){

  .movies{
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  }

}
.watch:hover { transform:scale(1.03); }
.footer-categories{display:none}
</style>
</head>
<body>

<div class="logo">
  <img src="https://i.ibb.co/1GMMrMmS/logo.png" alt="BUSANSO">
</div>

<div class="nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='series.html'">📺 Series</button>
  <button onclick="location.href='donate.html'">❤️ Donate</button>
  <button onclick="location.href='watch.html'">👤 My Account</button>
</div>

<div class="search">
  <input id="search" placeholder="🔍 Search movies......">
  <select id="genreFilter">
    <option value="ALL">All Genres</option>
    <option value="ACTION">Action</option>
    <option value="COMEDY">Comedy</option>
    <option value="DRAMA">Drama</option>
    <option value="HORROR">Horror</option>
    <option value="ROMANCE">Romance</option>
    <option value="SCI-FI">SCI-FI</option>
  </select>
</div>

<div class="movies" id="list"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = 'https://dhkfhhybzcxdeoalcfqx.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY';
const supabase = createClient(supabaseUrl, supabaseKey);

const box = document.getElementById("list");
const search = document.getElementById("search");
const genreSelect = document.getElementById("genreFilter");
let activeGenre = null;
let MOVIES = [];

const isPremiumUser = !!localStorage.getItem("activePIN");

function render(data){

  box.innerHTML = "";

  if(!data || data.length===0){
    box.innerHTML="<p>No movies available.</p>";
    return;
  }

  data.forEach(m=>{

    const c = document.createElement("div");
    c.className = "card";

    c.onclick = () => {
      location.href = `movie.html?id=${m.id}`;
    };

    let badge = "";

    if(!isPremiumUser && m.type){
      badge = `
        <div class="badge ${m.type.toLowerCase()}">
          ${m.type}
        </div>
      `;
    }

    c.innerHTML = `
      <div style="position:relative">
        ${badge}
        <img src="${m.poster}" alt="${m.title}">
      </div>

      <div class="info">
        <div class="title">${m.title}</div>

        <div class="meta">
          ${m.country || ''} • ${m.year || ''} • ${m.genre || ''}
          <br>👁 ${m.views || 0} views
        </div>
      </div>
    `;

    box.appendChild(c);

  });

}

function applyFilters(){
  let filtered = [...MOVIES];
  if(activeGenre){
    filtered = filtered.filter(m => m.genre && m.genre.toLowerCase() === activeGenre.toLowerCase());
  }
  const q = search.value.trim().toLowerCase();
  if(q){
    filtered = filtered.filter(m => m.title.toLowerCase().includes(q));
  }
  render(filtered);
}

search.oninput = applyFilters;
genreSelect.onchange = () => {
  const val = genreSelect.value;
  activeGenre = val==="ALL"?null:val;
  applyFilters();
}

async function loadMovies(){
  const { data, error } = await supabase
    .from('movies')
    .select('*')
    .order('created_at',{ascending:false}); // newest first
  if(error){ console.error(error); box.innerHTML="<p>Failed to load movies.</p>"; return; }
  if(!data || data.length===0){ box.innerHTML="<p>No movies available.</p>"; return; }
  MOVIES = data;
  render(MOVIES);
}

loadMovies();
</script>

</body>
</html>
