<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BUSANSO – Movies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing:border-box }
body {
  margin:0;
  background:#0f0f0f;
  color:#fff;
  font-family:'Comic Sans MS', Arial, sans-serif;
  overflow-x:hidden;
}
.logo {
  display:flex;
  justify-content:center;
  padding:16px 10px 6px;
  z-index:10;
  position:relative;
}
.logo img {
  height:50px;
  border-radius:12px;
}
.nav {
  display:flex;
  gap:10px;
  padding:12px;
  background:#111;
  position:sticky;
  top:0;
  z-index:10;
}
.nav button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:18px;
  background:linear-gradient(45deg,#ff7f50,#ff6347);
  color:#fff;
  font-weight:bold;
  font-size:14px;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 4px 12px rgba(0,0,0,.5);
}
.nav button:nth-child(2){background:linear-gradient(45deg,#6a5acd,#836fff)}
.nav button:nth-child(3){background:linear-gradient(45deg,#20b2aa,#3cb371)}
.nav button:nth-child(4){background:linear-gradient(45deg,#ff69b4,#ff1493)}
.nav button:hover { filter:brightness(1.2) saturate(1.3); transform:translateY(-2px) scale(1.05); }

.search {
  padding:16px;
}
.search input, .search select {
  width:100%;
  padding:12px;
  border-radius:16px;
  border:none;
  background:#222;
  color:#fff;
  font-size:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.5);
  margin-bottom:10px;
}

.movies {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  padding:16px;
  justify-content:center;
}

.card {
  background:#181818;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,.5);
  flex:0 0 160px;
  transition:.25s;
}
.card:hover {
  transform:scale(1.05);
}
.card img {
  width:100%;
  height:240px;
  object-fit:cover;
  display:block;
}
.badge {
  position:absolute;
  top:8px;
  left:8px;
  padding:4px 8px;
  font-size:10px;
  font-weight:bold;
  border-radius:8px;
  text-transform:uppercase;
  box-shadow:0 2px 6px rgba(0,0,0,.6);
}
.badge.free{background:#28a745}
.badge.premium{background:#e50914}
.info {
  padding:8px;
}
.title {
  font-weight:bold;
  font-size:14px;
  margin-bottom:4px;
}
.meta {
  font-size:11px;
  color:#ccc;
  margin-bottom:6px;
}
.watch {
  width:100%;
  padding:8px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#e50914,#ff416c);
  color:#fff;
  font-weight:bold;
  font-size:12px;
  cursor:pointer;
  transition:.25s;
}
.watch:hover { transform:scale(1.03); }
.footer-categories{display:none}
</style>
</head>
<body>

<div class="logo">
  <img src="https://i.ibb.co/1GMMrMmS/logo.png" alt="BUSANSO">
</div>

<div class="nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='series.html'">📺 Series</button>
  <button onclick="location.href='donate.html'">❤️ Donate</button>
  <button onclick="location.href='https://www.youtube.com/channel/UC9tPdYzPSM6LOXSGUbea7nw'">😂 Funny Videos</button>
</div>

<div class="search">
  <input id="search" placeholder="Search movies...">
  <select id="genreFilter">
    <option value="ALL">All Genres</option>
    <option value="ACTION">Action</option>
    <option value="COMEDY">Comedy</option>
    <option value="DRAMA">Drama</option>
    <option value="HORROR">Horror</option>
    <option value="ROMANCE">Romance</option>
    <option value="SCI-FI">SCI-FI</option>
  </select>
</div>

<div class="movies" id="list"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabaseUrl = 'https://dhkfhhybzcxdeoalcfqx.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY';
const supabase = createClient(supabaseUrl, supabaseKey);

const box = document.getElementById("list");
const search = document.getElementById("search");
const genreSelect = document.getElementById("genreFilter");
let activeGenre = null;
let MOVIES = [];

function render(data){
  box.innerHTML = "";
  if(!data || data.length===0){
    box.innerHTML="<p>No movies available.</p>";
    return;
  }
  data.forEach(m=>{
    const c=document.createElement("div");
    c.className="card";
    const badge = m.type ? `<div class="badge ${m.type.toLowerCase()}">${m.type}</div>` : "";
    c.innerHTML=`
      <div style="position:relative">
        ${badge}
        <img src="${m.poster}" alt="${m.title}">
      </div>
      <div class="info">
        <div class="title">${m.title}</div>
        <div class="meta">${m.country || ''} • ${m.year || ''} • ${m.genre || ''}</div>
        <button class="watch">▶ Watch</button>
      </div>`;
    c.querySelector("button.watch").onclick = () => location.href = `movie.html?id=${m.id}`;
    box.appendChild(c);
  });
}

function applyFilters(){
  let filtered = [...MOVIES];
  if(activeGenre){
    filtered = filtered.filter(m => m.genre && m.genre.toLowerCase() === activeGenre.toLowerCase());
  }
  const q = search.value.trim().toLowerCase();
  if(q){
    filtered = filtered.filter(m => m.title.toLowerCase().includes(q));
  }
  render(filtered);
}

search.oninput = applyFilters;
genreSelect.onchange = () => {
  const val = genreSelect.value;
  activeGenre = val==="ALL"?null:val;
  applyFilters();
}

async function loadMovies(){
  const { data, error } = await supabase
    .from('movies')
    .select('*')
    .order('created_at',{ascending:false}); // newest first
  if(error){ console.error(error); box.innerHTML="<p>Failed to load movies.</p>"; return; }
  if(!data || data.length===0){ box.innerHTML="<p>No movies available.</p>"; return; }
  MOVIES = data;
  render(MOVIES);
}

loadMovies();
</script>

</body>
</html>
