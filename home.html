/* ===============================
FETCH CONTENT
=============================== */

async function fetchContent(){


  // Remove skeletons
  heroSlider.innerHTML = `
    <div class="hero-skeleton"></div>
    <div class="hero-skeleton"></div>
    <div class="hero-skeleton"></div>
  `;

  trendingBox.innerHTML = "";
  moviesBox.innerHTML = "";
  seriesBox.innerHTML = "";
  freeMoviesBox.innerHTML = "";
  freeSeriesBox.innerHTML = "";
  heroDots.innerHTML = "";

  let trendingItems = [];

  try{

    /* ===============================
       FETCH MOVIES
    =============================== */

    const { data: movies, error: movieError } =
      await supabase
      .from("movies")
      .select("*")
      .order("created_at",{ascending:false});

    if(movieError) console.error(movieError);

    movies.forEach(movie=>{

      moviesBox.appendChild(
        createCard(movie,"movie")
      );

      trendingItems.push({
        ...movie,
        kind:"movie"
      });

      if(movie.type!=="premium"){

        freeMoviesBox.appendChild(
          createCard(movie,"movie")
        );

      }

    });


    /* ===============================
       FETCH SERIES
    =============================== */

    const { data: series, error: seriesError } =
      await supabase
      .from("series")
      .select("*")
      .order("created_at",{ascending:false});

    if(seriesError) console.error(seriesError);

    series.forEach(show=>{

      seriesBox.appendChild(
        createCard(show,"series")
      );

      trendingItems.push({
        ...show,
        kind:"series"
      });

      if(show.type!=="premium"){

        freeSeriesBox.appendChild(
          createCard(show,"series")
        );

      }

    });


    /* ===============================
       HERO SLIDER
    =============================== */

    heroSlider.innerHTML = "";

    const latestContent = [...trendingItems];

    latestContent.sort(
      (a,b)=>
      new Date(b.created_at)-new Date(a.created_at)
    );

    latestContent
    .slice(0,8)
    .forEach((item,index)=>{

      heroSlider.appendChild(

        createHero(item,item.kind)

      );

      const dot=document.createElement("div");

      dot.className="hero-dot";

      if(index===0){

        dot.classList.add("active");

      }

      heroDots.appendChild(dot);

    });


    /* ===============================
       TRENDING
    =============================== */

    trendingItems.sort(
      (a,b)=>(b.views||0)-(a.views||0)
    );

    trendingItems
    .slice(0,10)
    .forEach(item=>{

      trendingBox.appendChild(

        createCard(item,item.kind)

      );

    });

  }

  catch(err){

    console.error(err);

  }

}
/* ==========================================

/* ==========================================
AUTO HERO SLIDER
========================================== */

let currentHero = 0;

setInterval(()=>{

    const posters =
    document.querySelectorAll(".hero-poster");

    const dots =
    document.querySelectorAll(".hero-dot");

    if(!posters.length) return;

    currentHero++;

    if(currentHero >= posters.length){

        currentHero = 0;

    }

    posters[currentHero].scrollIntoView({block:"nearest",

        behavior:"smooth",

        inline:"center"

    });

    dots.forEach(dot=>{

        dot.classList.remove("active");

    });

    if(dots[currentHero]){

        dots[currentHero].classList.add("active");

    }

},6000);


/* ==========================================
ALLOW CLICKING HERO DOTS
========================================== */

heroDots.addEventListener("click",(e)=>{

    if(!e.target.classList.contains("hero-dot")) return;

    const dots=[...document.querySelectorAll(".hero-dot")];

    currentHero=dots.indexOf(e.target);

    document
    .querySelectorAll(".hero-poster")[currentHero]
    .scrollIntoView({block:"nearest",

        behavior:"smooth",

        inline:"center"

    });

    dots.forEach(dot=>dot.classList.remove("active"));

    e.target.classList.add("active");

});
