<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BUSANSO – Series</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ACTIVE PIN CHECK -->

<script>
(function(){

  // ✅ Special PIN (kibanda)
  var specialAccess = localStorage.getItem("kibandaAccess");

  if(specialAccess === "true"){
    location.replace("kibwatch.html");
    return;
  }

  // ✅ Normal PIN
  const activePIN = localStorage.getItem("activePIN");

  if(
      activePIN &&
      activePIN !== "undefined" &&
      activePIN !== ""
  ){
      location.replace("watch.html");
      return;
  }

})();
</script>
<style>
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b1c24,#0a0f1a);color:#eaf6ff;font-family:Arial,sans-serif;}
.logo{display:flex;justify-content:center;padding:18px 10px 10px;background:#07141c;}
.logo img{height:66px;}
.nav{display:flex;gap:12px;padding:14px;background:#07141c;position:sticky;top:0;z-index:10;}
.nav button{flex:1;padding:8px;border:none;border-radius:38px;background:linear-gradient(135deg,#1f6cff,#29ffd8);color:#001018;font-weight:bold;font-size:14px;cursor:pointer;transition:.25s;}
.nav button:hover{transform:translateY(-2px) scale(1.02);filter:brightness(1.1);}
.search{padding:16px;background:#07141c;}
.search input{width:100%;padding:16px;border-radius:20px;border:none;background:#102a38;color:#eaf6ff;font-size:15px;}
.search input::placeholder{color:#9fc6d9;}
.filters{display:flex;gap:12px;margin:12px 0;}
.filters select{flex:1;padding:12px;border-radius:16px;border:none;background:#102a38;color:#eaf6ff;font-size:14px;}
.series{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px;margin-bottom:80px;}
@media(min-width:768px){.series{grid-template-columns:repeat(4,1fr);gap:16px;}}
@media(min-width:1200px){.series{grid-template-columns:repeat(5,1fr);gap:18px;}}
.card{background:linear-gradient(180deg,#102a38,#0b1c24);border-radius:22px;overflow:hidden;box-shadow:0 14px 35px rgba(0,0,0,.5);opacity:0;transform:translateY(20px);animation:fade .4s forwards;transition:.25s;}
.card:hover{transform:translateY(-6px);}
@keyframes fade{to{opacity:1;transform:none}}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;}
  .poster-wrap{
  position:relative;
}

/* STATUS BADGE ON POSTER */
.status-badge{
  position:absolute;
  top:10px;
  left:10px;
  z-index:5;

  padding:5px 10px;
  border-radius:999px;

  font-size:10px;
  font-weight:700;
  letter-spacing:.5px;

  color:#fff;

  backdrop-filter:blur(6px);
  box-shadow:0 4px 12px rgba(0,0,0,.45);
}

/* COLORS */
.status-badge.completed{
  background:rgba(16,185,129,.92);
}

.status-badge.ongoing{
  background:rgba(59,130,246,.92);
}

.status-badge.canceled{
  background:rgba(239,68,68,.92);
}
.info{padding:12px}
.title{font-weight:bold;font-size:14px;}
.meta{font-size:11px;color:#9fc6d9;margin:6px 0 12px;}
.watch{width:100%;padding:12px;border:none;border-radius:20px;background:linear-gradient(135deg,#29ffd8,#1f6cff);color:#001018;font-weight:bold;font-size:13px;cursor:pointer;transition:.25s;}
.watch:hover{transform:scale(1.03);filter:brightness(1.1);}
 .notification-modal{ position:fixed; inset:0; background:rgba(0,0,0,.75); display:none; align-items:center; justify-content:center; z-index:99999; } .notification-box{ width:min(90%,420px); background:#0f2230; border-radius:24px; padding:24px; box-shadow:0 20px 50px rgba(0,0,0,.5); } .notification-title{ font-size:20px; font-weight:bold; margin-bottom:10px; } .notification-message{ color:#cde8f6; line-height:1.5; margin-bottom:20px; } .notification-close{ width:100%; border:none; padding:14px; border-radius:16px; background:linear-gradient(135deg,#29ffd8,#1f6cff); font-weight:bold; cursor:pointer; }
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="https://i.ibb.co/1GMMrMmS/logo.png" alt="BUSANSO">
</div>

<!-- NAV -->
<div class="nav">
 
  <button onclick="location.href='login.html'">🎬 Click here if you paid</button>
    <button onclick="location.href='library-login.html'">🎬 Click here if you have a library</button>

</div>

<!-- SEARCH & FILTERS -->
<div class="search">
  <input id="search" placeholder="Search series...">
  <div class="filters">
    <select id="countryFilter">
      <option value="">All Countries</option>
    </select>
    <select id="genreFilter">
      <option value="">All Genres</option>
    </select>
  </div>
</div>

<!-- SERIES GRID -->
<div class="series" id="list"></div>

<!-- ===== SUPABASE FETCH LOGIC ===== -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = "https://dhkfhhybzcxdeoalcfqx.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
window.closeNotification = function(){
  document.getElementById("notificationModal").style.display="none";
};
async function checkNotifications(){

  const { data, error } = await supabase
    .from("notifications")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(1);

  if(error || !data?.length) return;

  const notification = data[0];

  const seen = localStorage.getItem(
    "seen_notification_" + notification.id
  );

  if(seen) return;

  document.getElementById("notificationTitle").textContent =
    notification.title;

  document.getElementById("notificationMessage").textContent =
    notification.message;

  document.getElementById("notificationModal").style.display =
    "flex";

  localStorage.setItem(
    "seen_notification_" + notification.id,
    "yes"
  );
}
const box = document.getElementById("list");
const search = document.getElementById("search");
const countryFilter = document.getElementById("countryFilter");
const genreFilter = document.getElementById("genreFilter");
let SERIES = [];

// CACHE IMAGE
async function cacheImage(url){
  if('caches' in window){
    const cache = await caches.open('series-images');
    const res = await fetch(url, {mode:'no-cors'});
    await cache.put(url, res);
  }
}

// RENDER SERIES
function render(data){
  box.innerHTML = "";
  data.forEach((s,i)=>{
    const c = document.createElement("div");
    c.className = "card";
    c.style.animationDelay = i*.05+"s";
c.innerHTML = `
  <div class="poster-wrap">

    <img src="${s.poster}" loading="lazy" class="poster-click">

    <div class="status-badge ${s.status?.toLowerCase()}">
      ${s.status || "COMPLETED"}
    </div>

  </div>

  <div class="info">
    <div class="title">${s.title}</div>

    <div class="meta">
      ${s.country} • ${s.genre} • ${s.year}
    </div>
  </div>
`;

// CLICK ENTIRE CARD (OR JUST POSTER)
c.querySelector(".poster-click").onclick = () => {

  const title = (s.title || "").trim().toUpperCase();

  if(title === "MEERA 55"){
      location.href = `serie.html?id=${s.id}`;
  }else{
      location.href = "packages.html";
  }

};
    box.appendChild(c);
    cacheImage(s.poster);
  });
}

// POPULATE FILTERS
function populateFilters(data){
  const countries = [...new Set(data.map(s=>s.country).filter(Boolean))];
  const genres = [...new Set(data.map(s=>s.genre).filter(Boolean))];
  countries.forEach(c=>{
    const opt = document.createElement('option'); opt.value=c; opt.textContent=c; countryFilter.appendChild(opt);
  });
  genres.forEach(g=>{
    const opt = document.createElement('option'); opt.value=g; opt.textContent=g; genreFilter.appendChild(opt);
  });
}

// APPLY SEARCH & DROPDOWN FILTERS
function applyFilters(){
  let filtered = SERIES;
  const q = search.value.toLowerCase();
  const selectedCountry = countryFilter.value;
  const selectedGenre = genreFilter.value;
  if(selectedGenre) filtered = filtered.filter(s=>s.genre && s.genre.toUpperCase() === selectedGenre.toUpperCase());
  if(selectedCountry) filtered = filtered.filter(s=>s.country && s.country === selectedCountry);
  if(q) filtered = filtered.filter(s=>s.title.toLowerCase().includes(q));
  render(filtered);
}

search.oninput = applyFilters;
countryFilter.onchange = applyFilters;
genreFilter.onchange = applyFilters;

// FETCH SERIES FROM SUPABASE
(async()=>{
  try{
    const { data, error } = await supabase.from("series").select("*").order("created_at",{ascending:false});
    if(error) throw error;
SERIES = data;
populateFilters(SERIES);
render(SERIES);

checkNotifications();

console.log("Series fetched:", data);
  }catch(err){
    console.error("Supabase fetch failed:", err);
    alert("Failed to fetch series from Supabase. Check console for details.");
  }
})();
</script>
<div id="notificationModal" class="notification-modal">
  <div class="notification-box">

    <div id="notificationTitle"
         class="notification-title">
    </div>

    <div id="notificationMessage"
         class="notification-message">
    </div>

    <button class="notification-close"
            onclick="closeNotification()">
      OK
    </button>

  </div>
</div>
</body>
</html>
