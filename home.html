<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabaseUrl='https://dhkfhhybzcxdeoalcfqx.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY';
const supabase=createClient(supabaseUrl,supabaseKey);
const moviesBox=document.getElementById("moviesBox");
const freeMoviesBox=document.getElementById("freeMoviesBox");
const seriesBox=document.getElementById("seriesBox");
const freeSeriesBox=document.getElementById("freeSeriesBox");

/* ===== PIN REDIRECT ===== */
(function(){ var pin=localStorage.getItem("activePIN"); var exp=Number(localStorage.getItem("pinExpiry")); if(pin&&exp&&Date.now()<exp){ location.replace("watch.html"); }})();

/* ===== CARD CREATOR ===== */
function createCard(item,type){
  var isPremium=item.type==="premium";
  var card=document.createElement("div");
  card.className="card";
  card.innerHTML=
  '<div style="position:relative">'+
  '<img src="'+item.poster+'">'+
  '<span class="badge '+(isPremium?'premium':'')+'">'+
  (isPremium?'PREMIUM':'FREE')+'</span>'+
  (isPremium?'<div class="lock-icon">LOCKED</div>':'')+
  '</div>'+
  '<div class="card-title">'+item.title+'</div>'+
  '<button class="watch-btn">'+(isPremium?'Pay to Watch':'Watch')+'</button>';
  card.querySelector(".watch-btn").onclick=function(){
    if(isPremium) location.href="packages.html";
    else location.href=(type==="movie"?"movie.html?id=":"serie.html?id=")+item.id;
  };
  return card;
}

/* ===== FETCH CONTENT FROM SUPABASE ===== */
async function fetchContent(){
  try{
    const { data: movies, error: mErr } = await supabase.from('movies').select('*').order('created_at',{ascending:false});
    if(mErr) console.error("Movies fetch error:", mErr);
    else movies.forEach(m=>{
      moviesBox.appendChild(createCard(m,"movie"));
      if(m.type!=="premium") freeMoviesBox.appendChild(createCard(m,"movie"));
    });
    const { data: series, error: sErr } = await supabase.from('series').select('*').order('created_at',{ascending:false});
    if(sErr) console.error("Series fetch error:", sErr);
    else series.forEach(s=>{
      seriesBox.appendChild(createCard(s,"series"));
      if(s.type!=="premium") freeSeriesBox.appendChild(createCard(s,"series"));
    });
  }catch(err){console.error(err);}
}
fetchContent();

/* ===== INSTALL LOGIC ===== */
let deferredPrompt;
const installBtn=document.getElementById("installBtn");
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true; }
if(isStandalone()){ installBtn.textContent="Open App"; installBtn.onclick=()=>{ window.location.href="home.html"; }; }
else{
  window.addEventListener("beforeinstallprompt",(e)=>{ e.preventDefault(); deferredPrompt=e; });
  installBtn.onclick=async()=>{
    if(deferredPrompt){ deferredPrompt.prompt(); const result=await deferredPrompt.userChoice; if(result.outcome==="accepted") installBtn.textContent="Open App"; deferredPrompt=null; }
    else window.location.href="install.html";
  };
}

/* ===== AUDIO LOGIC ===== */
const bgAudio=document.getElementById("bgAudio");
const audioToggle=document.getElementById("audioToggle");
let isMuted=false;
bgAudio.volume=0.3;
function startAudio(){ bgAudio.play().catch(()=>{}); document.removeEventListener("click",startAudio); }
document.addEventListener("click",startAudio);
audioToggle.onclick=()=>{ isMuted=!isMuted; bgAudio.muted=isMuted; audioToggle.textContent=isMuted?"🔇":"🔊"; };
</script>
