<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabaseUrl='https://dhkfhhybzcxdeoalcfqx.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY';
const supabase=createClient(supabaseUrl,supabaseKey);

window.closeNotification = function(){

  const notificationId =
    document.getElementById("notificationModal")
    .dataset.notificationId;

  if(notificationId){
    localStorage.setItem(
      "seen_notification_" + notificationId,
      "yes"
    );
  }

  document.getElementById("notificationModal").style.display =
    "none";
};

async function checkNotifications(){

  const { data, error } = await supabase
    .from("notifications")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(1);

  if(error || !data?.length) return;

  const notification = data[0];

  const seen = localStorage.getItem(
    "seen_notification_" + notification.id
  );

  if(seen) return;

  document.getElementById("notificationTitle").textContent =
    notification.title;

  document.getElementById("notificationMessage").textContent =
    notification.message;

  const actionBtn =
    document.getElementById("notificationAction");

  actionBtn.textContent =
    notification.button_text || "Open";

  actionBtn.onclick = () => {

    localStorage.setItem(
      "seen_notification_" + notification.id,
      "yes"
    );

    if(notification.button_url){
      location.href = notification.button_url;
    }else{
      closeNotification();
    }

  };

  document.getElementById("notificationModal")
    .dataset.notificationId = notification.id;

  document.getElementById("notificationModal").style.display =
    "flex";
}
const moviesBox=document.getElementById("moviesBox");
const trendingBox =
document.getElementById("trendingBox");

const freeMoviesBox=document.getElementById("freeMoviesBox");

const seriesBox=document.getElementById("seriesBox");
const freeSeriesBox=document.getElementById("freeSeriesBox");

/* ===== PIN REDIRECT ===== */
(function(){
  // ✅ Normal active PIN
  var activePin = localStorage.getItem("activePIN");
  var activeExp = Number(localStorage.getItem("pinExpiry"));

  if(activePin && activeExp && Date.now() < activeExp){
    location.replace("watch.html");
    return;
  }

  // ✅ Special PIN (kibanda)
  var specialAccess = localStorage.getItem("kibandaAccess");

  if(specialAccess === "true"){
    location.replace("kibwatch.html");
    return;
  }

})();

/* ===== CARD CREATOR ===== */
function createCard(item, type) {

  const isPremium = item.type === "premium";

  const card = document.createElement("div");
  card.className = "card";

  // optional: mark premium cards for styling
  if (isPremium) card.classList.add("premium");

  card.innerHTML = `
    <div style="position:relative">
      <img src="${item.poster}">
      
      <span class="badge ${isPremium ? 'premium' : ''}">
        ${isPremium ? 'PREMIUM' : 'FREE'}
      </span>
    </div>

    <div class="card-title">${item.title}</div>

    <button class="watch-btn">
      ${isPremium ? 'Pay to Watch' : 'Watch'}
    </button>
  `;

  // 🔒 SINGLE CONTROL POINT (very important)
  card.querySelector(".watch-btn").onclick = () => {

    if (isPremium) {
      // 🚫 free users blocked here
      location.href = "packages.html";
    } else {
      // ✅ allowed content
      location.href = type === "movie"
        ? `movie.html?id=${item.id}`
        : `serie.html?id=${item.id}`;
    }

  };

  return card;
}
/* ===== FETCH CONTENT FROM SUPABASE ===== */
async function fetchContent(){

  // Remove skeleton cards
  trendingBox.innerHTML = "";
  moviesBox.innerHTML = "";
  seriesBox.innerHTML = "";
  freeMoviesBox.innerHTML = "";
  freeSeriesBox.innerHTML = "";

  try{
    const { data: movies, error: mErr } = await supabase.from('movies').select('*').order('created_at',{ascending:false});
    if(mErr) console.error("Movies fetch error:", mErr);
    else movies.forEach((m,index)=>{

  moviesBox.appendChild(
    createCard(m,"movie")
  );

  if(index < 10){
    trendingBox.appendChild(
      createCard(m,"movie")
    );
  }
      if(m.type!=="premium") freeMoviesBox.appendChild(createCard(m,"movie"));
    });
    const { data: series, error: sErr } = await supabase.from('series').select('*').order('created_at',{ascending:false});
    if(sErr) console.error("Series fetch error:", sErr);
    else series.forEach(s=>{
      seriesBox.appendChild(createCard(s,"series"));
      if(s.type!=="premium") freeSeriesBox.appendChild(createCard(s,"series"));
    });
  }catch(err){console.error(err);}
}
fetchContent();


document.addEventListener("DOMContentLoaded", () => {
  checkNotifications();
});

</script>
