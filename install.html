<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Install BUSANSO NATION</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#161616,#000);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:420px;
  text-align:center;
}

.logo{
  width:120px;
  height:120px;
  border-radius:28px;
  margin:auto;
  margin-bottom:20px;
  box-shadow:0 0 40px rgba(229,9,20,.35);
}

h1{
  font-size:2rem;
  margin-bottom:10px;
}

.subtitle{
  color:#9ca3af;
  margin-bottom:25px;
  line-height:1.6;
}

.loader{
  width:70px;
  height:70px;
  border:5px solid rgba(255,255,255,.08);
  border-top:5px solid #e50914;
  border-radius:50%;
  margin:20px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

.status{
  color:#bbb;
  font-size:.95rem;
  margin-bottom:25px;
}

.install-btn{
  display:none;
  width:100%;
  padding:18px;
  border:none;
  border-radius:14px;
  background:#e50914;
  color:#fff;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(229,9,20,.35);
}

.install-btn:hover{
  opacity:.95;
}

</style>
</head>

<body>

<div class="card">

  <img
    src="icons/icon-512.png"
    class="logo"
    alt="BUSANSO"
  >

  <h1>BUSANSO NATION</h1>

  <div class="subtitle">
    Entertainment Without Limits
  </div>

  <div id="loader" class="loader"></div>

  <div id="status" class="status">
    Lindako katono nyo...
  </div>

  <button id="installBtn" class="install-btn">
    INSTALL NOW
  </button>

</div>

<script>

const APK_URL =
"https://dhkfhhybzcxdeoalcfqx.supabase.co/storage/v1/object/public/apk/Busanso%20Nation%202026.apk";

const installBtn =
document.getElementById("installBtn");

const loader =
document.getElementById("loader");

const status =
document.getElementById("status");

let deferredPrompt = null;

/* already installed */
if(
  window.matchMedia("(display-mode: standalone)").matches ||
  window.navigator.standalone
){
  location.replace("home.html");
}

/* iphone/ipad */
const isIOS =
/iphone|ipad|ipod/i.test(
navigator.userAgent
);

if(isIOS){

  location.replace("home.html");

}

/* register service worker */
if("serviceWorker" in navigator){

  navigator.serviceWorker.register(
    "service-worker.js"
  );

}

/* PWA available */
window.addEventListener(
"beforeinstallprompt",
(e)=>{

  e.preventDefault();

  deferredPrompt = e;

  loader.style.display="none";

  status.style.display="none";

  installBtn.style.display="block";

  installBtn.onclick = async ()=>{

    deferredPrompt.prompt();

    await deferredPrompt.userChoice;

  };

});

/* installed */
window.addEventListener(
"appinstalled",
()=>{

  location.replace("home.html");

});

/* Android fallback */
setTimeout(()=>{

  if(deferredPrompt) return;

  const isAndroid =
  /android/i.test(
    navigator.userAgent
  );

  loader.style.display="none";
  status.style.display="none";

  installBtn.style.display="block";

  if(isAndroid){

    installBtn.onclick = ()=>{

      location.href = https://dhkfhhybzcxdeoalcfqx.supabase.co/storage/v1/object/public/apk/Busanso%20Nation%202026.apk;

    };

  }else{

    installBtn.textContent =
    "ENTER BUSANSO";

    installBtn.onclick = ()=>{

      location.href =
      "home.html";

    };

  }

},5000);

</script>

</body>
</html>
