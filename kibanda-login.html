<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kibanda Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#0b0b0b;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  background:#1a1a1a;
  padding:28px;
  border-radius:10px;
  max-width:360px;
  width:100%;
  text-align:center;
}
.header{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
  color:#22c55e;
}
input{
  width:90%;
  padding:12px;
  margin:12px 0;
  border-radius:6px;
  border:none;
  background:#222;
  color:#fff;
  text-align:center;
}
button{
  width:100%;
  padding:12px;
  background:#16a34a;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
.ad-box{
  margin:20px auto;
  text-align:center;
  max-width:100%;
}
button:hover{background:#22c55e;}
.msg{margin-top:10px;font-size:14px;color:#ff4d4d;}
.link{margin-top:10px;display:none;color:#60a5fa;cursor:pointer;}
</style>
</head>
<body>

<div class="card">
  <div class="header">BUSANSO NATION</div>
  <h2>Login Kibanda</h2>
  <input id="phone" placeholder="Enter WhatsApp Number">
  <input id="pin" placeholder="Enter PIN">
  <button onclick="login()">Enter</button>
  <div class="msg" id="msg"></div>
  <span class="link" id="requestBtn" onclick="requestPin()">Request New PIN</span>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://dhkfhhybzcxdeoalcfqx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY'
);

let attempts = 0;

function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }
  return id;
}

async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

window.login = async function(){
  const phone = document.getElementById("phone").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const msg = document.getElementById("msg");
  const requestBtn = document.getElementById("requestBtn");

  msg.textContent = "";

  if(!phone || !pin){
    msg.textContent = "Phone and PIN required";
    return;
  }

  const deviceId = getDeviceId();
  const hashedPin = await hashPin(pin);

  const { data, error } = await supabase
    .from("special_pins")
    .select("*")
    .eq("pin_hash", hashedPin)
    .single();

  if(error || !data){
    attempts++;
    msg.textContent = "Invalid PIN";

    if(attempts >= 2){
      requestBtn.style.display = "block";
    }

    if(attempts >= 3){
      setTimeout(()=>{ location.href = "packages.html"; }, 1500);
    }

    return;
  }

  const now = new Date();

  if(data.expires_at && new Date(data.expires_at) < now){
    msg.textContent = "PIN expired";
    return;
  }

  if(data.is_used && data.device_id !== deviceId){
    msg.textContent = "PIN already used on another device";
    return;
  }

  if(!data.is_used){
    await supabase
      .from("special_pins")
      .update({
        is_used: true,
        device_id: deviceId,
        used_at: new Date(),
        phone: phone
      })
      .eq("id", data.id);
  }

  localStorage.setItem("kibandaAccess", "true");

  msg.style.color = "#00ff66";
  msg.textContent = "Access granted…";

  setTimeout(()=>{ location.href = "kibwatch.html"; }, 1000);
}

window.requestPin = function(){
  const msg = encodeURIComponent("Hello, I need a new Kibanda PIN");
  window.open(`https://wa.me/256XXXXXXXXX?text=${msg}`);
}
</script>

</div>

</body>
</html>
