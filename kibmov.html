<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; background:#111; color:#fff; font-family:Arial,sans-serif; display:flex; flex-direction:column; align-items:center; }
.banner { position:relative; width:100%; height:55vh; max-height:450px; overflow:hidden; display:flex; align-items:flex-end; justify-content:center; }
.banner img { width:100%; height:100%; object-fit:cover; object-position:center; transform:scale(1.1); pointer-events:none; }
.banner::after{ content:""; position:absolute; top:0; left:0; width:100%; height:100%; background:linear-gradient(to top, rgba(0,0,0,0.85) 30%, rgba(0,0,0,0.3) 60%, transparent 100%); }
.banner .buttons{ position:absolute; bottom:30px; left:0; right:0; display:flex; gap:12px; justify-content:center; z-index:10; }
button{ padding:14px 28px; font-size:16px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
#watchBtn{ background:#e50914; color:#fff; }
#downloadBtn{ background:#2563eb; color:#fff; }
.details{ max-width:900px; margin:20px auto; padding:0 16px; }
.player{ margin:20px auto; width:90%; max-width:1200px; aspect-ratio:16/9; display:none; border:none; border-radius:12px; }
@media(max-width:768px){
  .banner{ height:40vh; }
}
</style>
</head>
<body>

<div class="banner">
  <img id="posterImg" src="">
  <div class="buttons">
    <button id="watchBtn">▶ Watch Now</button>
    <button id="downloadBtn">⬇ Download</button>
  </div>
</div>

<div class="details">
  <h1 id="title">Movie is Loading...</h1>
  <p id="synopsis"></p>
  <p id="meta"></p>
</div>

<iframe id="player"
allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
allowfullscreen
class="player"></iframe>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
'https://dhkfhhybzcxdeoalcfqx.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoa2ZoaHliemN4ZGVvYWxjZnF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzQxNTEsImV4cCI6MjA4ODExMDE1MX0.jZ4NDNPJmO0Ji05TxDqCnzgLIIzKf9uCx3WrSgk2DaY'
);

const isPremium = !!localStorage.getItem("activePIN");

const params = new URLSearchParams(location.search);
const id = params.get("id");
if(!id){ location.href="movies-list.html"; }

const player = document.getElementById("player");
const watchBtn = document.getElementById("watchBtn");
const downloadBtn = document.getElementById("downloadBtn");
const posterImg = document.getElementById("posterImg");

/* ===== FETCH MOVIE ===== */
const { data: movie } = await supabase
  .from('movies')
  .select('*')
  .eq('id', id)
  .single();

document.getElementById("title").textContent = movie.title;
posterImg.src = movie.poster;
document.getElementById("synopsis").textContent = movie.synopsis || "";
document.getElementById("meta").textContent =
`${movie.year || ""} • ${movie.duration || ""} • ${movie.type || ""}`;

/* ===== VIDEO NORMALIZER ===== */
function getVideoUrl(url){
  if(!url) return "";
  if(url.includes("youtube.com")){
    const ytId = new URL(url).searchParams.get("v");
    return `https://www.youtube.com/embed/${ytId}?autoplay=1&controls=1&rel=0`;
  }
  if(url.includes("youtu.be")){
    const ytId = url.split("youtu.be/")[1].split("?")[0];
    return `https://www.youtube.com/embed/${ytId}?autoplay=1&controls=1&rel=0`;
  }
  if(url.includes("vimeo.com")){
    const vid = url.split("/").pop();
    return `https://player.vimeo.com/video/${vid}?autoplay=1`;
  }
  if(url.includes("/d/")){
    const driveId = url.split("/d/")[1].split("/")[0];
    return `https://drive.google.com/file/d/${driveId}/preview`;
  }
  return url;
}

/* ===== DOWNLOAD URL BUILDER ===== */
function getDownloadUrl(url){
  if(!url) return "";

  // Google Drive
  if(url.includes("drive.google.com") && url.includes("/d/")){
    const driveId = url.split("/d/")[1].split("/")[0];
    return `https://drive.google.com/uc?export=download&id=${driveId}`;
  }

  // Google Drive open?id=
  if(url.includes("drive.google.com") && url.includes("id=")){
    const driveId = new URL(url).searchParams.get("id");
    return `https://drive.google.com/uc?export=download&id=${driveId}`;
  }

  // YouTube watch
  if(url.includes("youtube.com/watch")){
    return url;
  }

  // YouTube short
  if(url.includes("youtu.be/")){
    const ytId = url.split("youtu.be/")[1].split("?")[0];
    return `https://www.youtube.com/watch?v=${ytId}`;
  }

  // Vimeo
  if(url.includes("vimeo.com")){
    return url;
  }

  // direct file link
  return url;
}

function playMovie(){
  player.src = getVideoUrl(movie.video);
  player.style.display = "block";
  posterImg.style.display = "none";
  watchBtn.style.display = "none";
  downloadBtn.style.display = "none";
  if(isPremium && player.requestFullscreen){
    player.requestFullscreen();
  }
}

function downloadMovie(){
  const downloadUrl = getDownloadUrl(movie.video);
  if(!downloadUrl) return;

  const isGoogleDrive = downloadUrl.includes("drive.google.com");
  const isDirectFile = /\.(mp4|mkv|avi|mov|webm|m4v)(\?.*)?$/i.test(downloadUrl);

  if(isGoogleDrive || isDirectFile){
    const a = document.createElement("a");
    a.href = downloadUrl;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.download = movie.title || "video";
    document.body.appendChild(a);
    a.click();
    a.remove();
    return;
  }

  window.open(downloadUrl, "_blank");
}

watchBtn.onclick = playMovie;
posterImg.onclick = playMovie;
downloadBtn.onclick = downloadMovie;
</script>

</body>
</html>
